name: Dependabot auto-merge

on:
  workflow_run:
    workflows: [CI, CodeQL]
    types: [completed]

permissions: {}

jobs:
  enable:
    name: Merge verified nonbreaking update
    # The trigger already limits sources to CI and CodeQL. Default-setup
    # CodeQL reports a per-run name such as "PR #16", so do not filter on
    # workflow_run.name here. The helper independently revalidates the SHA,
    # associated pull request, author, checks, base, and complete
    # patch-or-minor metadata. Unclassified updates fail closed for review.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    concurrency:
      group: pgshard-dependabot-automerge
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      checks: read
      contents: write
      pull-requests: write
    steps:
      # workflow_run uses the trusted default-branch implementation. Never
      # check out or execute the pull request head in this privileged workflow.
      - name: Check out trusted automation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Squash merge after exact-head verification
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: >-
          cargo run --locked -p pgshard-release -- dependabot-automerge
          --repository "$GITHUB_REPOSITORY" --sha "$HEAD_SHA"
