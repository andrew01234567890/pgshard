name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  changes:
    name: Detect components
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
      postgres_agent: ${{ steps.detect.outputs.postgres_agent }}
      catalog: ${{ steps.detect.outputs.catalog }}
      orch_catalog: ${{ steps.detect.outputs.orch_catalog }}
      pgwire: ${{ steps.detect.outputs.pgwire }}
      planner: ${{ steps.detect.outputs.planner }}
      proto: ${{ steps.detect.outputs.proto }}
      go: ${{ steps.detect.outputs.go }}
      website: ${{ steps.detect.outputs.website }}
      website_exists: ${{ steps.detect.outputs.website_exists }}
      ui: ${{ steps.detect.outputs.ui }}
      integration: ${{ steps.detect.outputs.integration }}
      images: ${{ steps.detect.outputs.images }}
      kind: ${{ steps.detect.outputs.kind }}
      performance: ${{ steps.detect.outputs.performance }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed and available components
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail

          base=""
          force_all=false
          case "$EVENT_NAME" in
            pull_request) base="$PR_BASE_SHA" ;;
            push)
              if [[ -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
                base="$PUSH_BEFORE_SHA"
              fi
              ;;
            schedule|workflow_dispatch) force_all=true ;;
          esac

          if [[ -n "$base" ]] && git cat-file -e "${base}^{commit}" 2>/dev/null; then
            git diff --name-only "$base" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files"
          else
            git ls-files > "$RUNNER_TEMP/changed-files"
          fi

          changed() {
            "$force_all" || grep -Eq "$1" "$RUNNER_TEMP/changed-files"
          }

          exists_at_head_or_base() {
            [[ -e "$1" ]] || {
              [[ -n "$base" ]] && git cat-file -e "${base}:$1" 2>/dev/null
            }
          }

          emit_component() {
            local output="$1"
            local exists="$2"
            local pattern="$3"
            local value=false
            if [[ "$exists" == true ]] && changed "$pattern"; then
              value=true
            fi
            echo "${output}=${value}" >> "$GITHUB_OUTPUT"
          }

          rust_exists=false
          postgres_agent_exists=false
          catalog_exists=false
          orch_catalog_exists=false
          pgwire_exists=false
          planner_exists=false
          proto_exists=false
          go_exists=false
          website_exists=false
          ui_exists=false
          integration_exists=false
          images_exists=false
          kind_exists=false
          performance_exists=false

          exists_at_head_or_base Cargo.toml && rust_exists=true
          exists_at_head_or_base crates/pgshard-agent/Cargo.toml && postgres_agent_exists=true
          exists_at_head_or_base crates/pgshard-catalog/Cargo.toml && catalog_exists=true
          exists_at_head_or_base crates/pgshard-orch/Cargo.toml && orch_catalog_exists=true
          exists_at_head_or_base crates/pgshard-pgwire/Cargo.toml && pgwire_exists=true
          exists_at_head_or_base crates/pgshard-planner/Cargo.toml && planner_exists=true
          exists_at_head_or_base buf.yaml && proto_exists=true
          exists_at_head_or_base operator/go.mod && go_exists=true
          exists_at_head_or_base website/package.json && website_exists=true
          exists_at_head_or_base ui/package.json && ui_exists=true
          exists_at_head_or_base tests/integration/Cargo.toml && integration_exists=true
          exists_at_head_or_base deploy/docker-bake.hcl && images_exists=true
          exists_at_head_or_base tests/e2e/Cargo.toml && kind_exists=true
          exists_at_head_or_base benchmarks/Cargo.toml && performance_exists=true

          emit_component rust "$rust_exists" '(^|/)(Cargo\.(toml|lock)|rust-toolchain(\.toml)?|[^/]+\.rs)$|^crates/|^proto/|^contracts/replication-slot-names\.json$|^deny\.toml$|^rustfmt\.toml$|^\.cargo/|^Makefile$|^\.github/workflows/'
          emit_component postgres_agent "$postgres_agent_exists" '^crates/(pgshard-agent|pgshard-types|pgshard-version)/|^crates/pgshard-catalog/migrations/0001_shardschema\.sql$|^Cargo\.(toml|lock)$|^rust-toolchain\.toml$|^rustfmt\.toml$|^\.cargo/|^\.dockerignore$|^deploy/(docker-bake\.hcl|images/rust\.Dockerfile|images/quarantine\.pg_hba\.conf)$|^Makefile$|^\.github/workflows/ci\.yml$'
          emit_component catalog "$catalog_exists" '^crates/pgshard-catalog/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component orch_catalog "$orch_catalog_exists" '^crates/(pgshard-orch|pgshard-catalog|pgshard-types)/|^operator/internal/tuning/|^contracts/replication-slot-names\.json$|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component pgwire "$pgwire_exists" '^crates/pgshard-pgwire/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component planner "$planner_exists" '^crates/pgshard-planner/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component proto "$proto_exists" '^buf\.yaml$|^proto/|^Makefile$|^\.github/workflows/'
          emit_component go "$go_exists" '^operator/|^proto/|^contracts/replication-slot-names\.json$|^Makefile$|^\.github/workflows/'
          emit_component website "$website_exists" '^website/|^docs/|^Makefile$|^\.github/workflows/'
          emit_component ui "$ui_exists" '^ui/|^proto/|^Makefile$|^\.github/workflows/'
          emit_component integration "$integration_exists" '^tests/integration/|^crates/|^operator/|^proto/|^Makefile$|^\.github/workflows/'
          emit_component images "$images_exists" '^deploy/|^Dockerfile|/Dockerfile$|^\.dockerignore$|^Cargo\.(toml|lock)$|^rust-toolchain\.toml$|^rustfmt\.toml$|^crates/|^operator/|^ui/|^Makefile$|^\.github/workflows/'
          emit_component kind "$kind_exists" '^tests/e2e/|^deploy/|^charts/|^crates/|^operator/|^ui/|^Makefile$|^\.github/workflows/'
          emit_component performance "$performance_exists" '^benchmarks/|^crates/|^Cargo\.(toml|lock)$|^Makefile$|^\.github/workflows/'
          current_website_exists=false
          [[ -f website/package.json ]] && current_website_exists=true
          echo "website_exists=${current_website_exists}" >> "$GITHUB_OUTPUT"

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select actionlint Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: Validate workflow contracts
        run: make actions-check
      - name: Validate title and public content
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == pull_request ]]; then
            cargo run --locked -p pgshard-release -- validate --subject "$PR_TITLE"
            cargo run --locked -p pgshard-release -- audit --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"
          elif [[ "$EVENT_NAME" == push && -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            cargo run --locked -p pgshard-release -- validate
            cargo run --locked -p pgshard-release -- audit \
              --base "$PUSH_BEFORE_SHA" --head "$GITHUB_SHA" \
              --allow-github-squash-author
          else
            cargo run --locked -p pgshard-release -- validate
          fi

  rust-static:
    name: Rust / static checks
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: |
          set -euo pipefail
          rustup show active-toolchain
          rustup component add rustfmt clippy
      - name: Install pinned Rust policy tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2
          fallback: none
      - name: Run Rust static policy
        run: make rust-static

  rust-test:
    name: Rust / tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Run workspace tests
        run: make rust-test
      - name: Run optimized planner safety regressions
        if: needs.changes.outputs.planner == 'true'
        run: |
          cargo test --release --locked -p pgshard-planner small_stack
          cargo test --release --locked -p pgshard-planner --test log_redaction
      - name: Verify explicit identity from a source archive
        env:
          ARCHIVE_VERSION: 9.8.7-archive-test
        run: |
          archive_dir="$RUNNER_TEMP/source-archive"
          mkdir -p "$archive_dir"
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          PGSHARD_BUILD_VERSION="$ARCHIVE_VERSION" \
          PGSHARD_GIT_SHA="$GITHUB_SHA" \
          PGSHARD_EXPECTED_VERSION="$ARCHIVE_VERSION" \
          PGSHARD_EXPECTED_SHA="$GITHUB_SHA" \
            cargo test --locked -p pgshard-version
      - name: Verify tag-only build identity invalidation
        run: |
          tag_dir="$RUNNER_TEMP/tag-invalidation"
          mkdir -p "$tag_dir"
          git archive HEAD | tar -x -C "$tag_dir"
          cd "$tag_dir"
          git init --quiet --initial-branch=main
          git config user.name "pgshard CI"
          git config user.email "noreply@github.com"
          git add --all
          git commit --quiet --message "test: create archive fixture"
          fixture_sha="$(git rev-parse HEAD)"
          development_version="0.0.0-dev+${fixture_sha:0:12}"
          PGSHARD_EXPECTED_VERSION="$development_version" \
          PGSHARD_EXPECTED_SHA="$fixture_sha" \
            cargo test --locked -p pgshard-version
          git tag v9.8.7
          PGSHARD_EXPECTED_VERSION="9.8.7" \
          PGSHARD_EXPECTED_SHA="$fixture_sha" \
            cargo test --locked -p pgshard-version

  catalog-postgres:
    name: Catalog / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: shardschema
          POSTGRES_PASSWORD: pgshard-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shardschema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Exercise migration and activation contracts
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/shardschema
        run: make catalog-test

  orch-catalog-postgres:
    name: Orchestrator catalog / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.orch_catalog == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: shardschema
          POSTGRES_PASSWORD: pgshard-ci-only
          POSTGRES_INITDB_ARGS: --set wal_level=logical --set max_prepared_transactions=10 --set hot_standby_feedback=on --set wal_receiver_status_interval=1s --set sync_replication_slots=on --set primary_slot_name=pgshard_member_0001 --set synchronized_standby_slots=pgshard_member_0001
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shardschema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres17:
        image: postgres:17
        env:
          POSTGRES_DB: shardschema
          POSTGRES_PASSWORD: pgshard-ci-only
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shardschema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Load one fenced standby attachment policy
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/shardschema
        run: make orch-catalog-test
      - name: Start a PostgreSQL 18 streaming standby
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t primary_containers < <(
            docker ps --filter publish=5432 --format '{{.ID}}'
          )
          test "${#primary_containers[@]}" -eq 1
          primary_container="${primary_containers[0]}"
          docker exec "$primary_container" psql \
            --username postgres --dbname shardschema --set ON_ERROR_STOP=1 \
            --command "CREATE ROLE pgshard_replicator WITH REPLICATION LOGIN PASSWORD 'pgshard-ci-only'"
          docker exec "$primary_container" psql \
            --username postgres --dbname shardschema --set ON_ERROR_STOP=1 \
            --command "CREATE ROLE pgshard_observer_restricted LOGIN PASSWORD 'pgshard-test-only'"
          docker exec "$primary_container" psql \
            --username postgres --dbname shardschema --set ON_ERROR_STOP=1 \
            --command "GRANT pg_read_all_stats TO pgshard_observer_restricted WITH INHERIT FALSE"
          docker exec --user postgres "$primary_container" sh -ceu \
            'printf "%s\n" "host replication pgshard_replicator all scram-sha-256" >> "$PGDATA/pg_hba.conf"; pg_ctl reload --pgdata "$PGDATA"'
          docker volume create pgshard-ci-standby >/dev/null
          docker run --rm --user postgres \
            --add-host host.docker.internal:host-gateway \
            --env PGPASSWORD=pgshard-ci-only \
            --volume pgshard-ci-standby:/var/lib/postgresql \
            postgres:18 \
            pg_basebackup --host host.docker.internal --port 5432 \
              --username pgshard_replicator \
              --pgdata /var/lib/postgresql/18/docker \
              --write-recovery-conf --wal-method stream --create-slot \
              --slot pgshard_member_0001 --checkpoint fast
          docker exec "$primary_container" psql \
            --username postgres --dbname shardschema --set ON_ERROR_STOP=1 \
            --command "SELECT slot_name, lsn FROM pg_catalog.pg_create_logical_replication_slot('pgshard_ci_anchor_00000000000000000000000000000001', 'pgoutput', false, true, true)"
          docker run --detach --name pgshard-ci-standby \
            --add-host host.docker.internal:host-gateway \
            --publish 5434:5434 \
            --user postgres \
            --volume pgshard-ci-standby:/var/lib/postgresql \
            postgres:18 \
            postgres -D /var/lib/postgresql/18/docker -p 5434 \
              -c "primary_conninfo=host=host.docker.internal port=5432 user=pgshard_replicator password=pgshard-ci-only dbname=shardschema application_name=pgshard_member_0001 sslmode=disable" \
              -c primary_slot_name=pgshard_member_0001 \
              -c hot_standby_feedback=on \
              -c wal_receiver_status_interval=1s \
              -c sync_replication_slots=on
          ready=false
          for _ in {1..30}; do
            if docker exec pgshard-ci-standby \
              pg_isready --username postgres --dbname shardschema --port 5434 >/dev/null
            then
              ready=true
              break
            fi
            sleep 1
          done
          if [[ "$ready" != true ]]; then
            docker logs pgshard-ci-standby
            exit 1
          fi
          receiver_count="$(docker exec pgshard-ci-standby psql \
            --username postgres --dbname shardschema --port 5434 \
            --tuples-only --no-align \
            --command "SELECT count(*) FROM pg_catalog.pg_stat_wal_receiver WHERE status = 'streaming' AND slot_name = 'pgshard_member_0001'")"
          test "$receiver_count" = 1
      - name: Observe local logical slots and prerequisites
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/shardschema
          PGSHARD_TEST_LEGACY_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5433/shardschema
          PGSHARD_TEST_STANDBY_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5434/shardschema
        run: make orch-slot-observer-test
      - name: Remove the PostgreSQL 18 streaming standby
        if: always()
        shell: bash
        run: |
          set -u
          docker rm --force pgshard-ci-standby 2>/dev/null || true
          mapfile -t primary_containers < <(
            docker ps --filter publish=5432 --format '{{.ID}}'
          )
          if [[ "${#primary_containers[@]}" -eq 1 ]]; then
            docker exec "${primary_containers[0]}" psql \
              --username postgres --dbname shardschema \
              --command "SELECT pg_catalog.pg_drop_replication_slot(slot_name) FROM pg_catalog.pg_replication_slots WHERE slot_name = 'pgshard_ci_anchor_00000000000000000000000000000001'" \
              --command "SELECT pg_catalog.pg_drop_replication_slot(slot_name) FROM pg_catalog.pg_replication_slots WHERE slot_name = 'pgshard_member_0001'" \
              >/dev/null || true
          fi
          docker volume rm pgshard-ci-standby 2>/dev/null || true

  planner-postgres:
    name: Planner / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.planner == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: pgshard-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Compare admitted syntax with PostgreSQL 18
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/postgres
        run: make planner-postgres-test

  pgwire-postgres:
    name: Pgwire / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.pgwire == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_INITDB_ARGS: --set wal_level=logical --set max_prepared_transactions=10
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Decode real PostgreSQL 18 wire and persistent-slot controls
        env:
          PGSHARD_PGWIRE_TEST_ADDRESS: 127.0.0.1:5432
        run: make pgwire-postgres-test

  pgwire-fuzz:
    name: Pgwire fuzz / ${{ matrix.target }}
    needs: changes
    if: needs.changes.outputs.pgwire == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - decode_startup
          - decode_frontend
          - decode_backend
          - pgoutput_decoder
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned fuzz toolchain
        env:
          FUZZ_TOOLCHAIN: nightly-2026-06-24
        run: |
          rustup toolchain install "$FUZZ_TOOLCHAIN" --profile minimal
          cargo install cargo-fuzz --version 0.13.2 --locked
      - name: Exercise bounded decoder
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_TOOLCHAIN: nightly-2026-06-24
        working-directory: crates/pgshard-pgwire
        run: |
          runs=10000
          if [[ "$GITHUB_EVENT_NAME" == schedule ]]; then
            runs=100000
          fi
          cargo +"$FUZZ_TOOLCHAIN" fuzz run "$FUZZ_TARGET" -- \
            -runs="$runs" -max_len=65536 -timeout=10

  protobuf:
    name: Protobuf contracts
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install pinned Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: 1.71.0
          setup_only: true
          github_token: ${{ github.token }}
      - name: Validate protobuf contracts
        run: make proto-check
      - name: Reject protobuf breaking changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git cat-file -e "$BASE_SHA:buf.yaml" 2>/dev/null; then
            buf breaking --against ".git#ref=$BASE_SHA"
          else
            echo "No protobuf contract exists at the pull request base; skipping initial breaking comparison."
          fi

  go-operator:
    name: Go operator
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Validate operator
        run: make go-check

  operator-kind:
    name: Operator KIND API safety
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Create disposable Kubernetes cluster
        run: |
          go install sigs.k8s.io/kind@v0.32.0
          kind create cluster \
            --name pgshard-operator \
            --image kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5 \
            --wait 90s
          test "$(kubectl version --output=json | jq --raw-output '.serverVersion.minor')" = "36"
          kubectl apply --server-side --field-manager=pgshard-ci -f operator/config/crd/bases/pgshard.io_pgshardclusters.yaml
      - name: Verify API ownership and deletion safety
        working-directory: operator
        env:
          PGSHARD_KIND_E2E: "true"
        run: >-
          go test -race -count=1
          -run '^(TestKINDCRDRejectsUnsafeSpecTransitionsWithoutWebhooks|TestKINDDeletionWaitsForPVCBeforeSameNameRecreate|TestKINDGarbageCollectorDeletesLatePostgreSQLCreationFence|TestKINDServerSideApplyPrunesAndIsolatesScaleOwnership)$'
          ./internal/controller
      - name: Delete disposable Kubernetes cluster
        if: always()
        run: kind delete cluster --name pgshard-operator

  operator-kind-manager:
    name: Operator KIND manager smoke
    needs: changes
    if: >-
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.images == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Set up local-image Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Build manager smoke images without publishing
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
          PGSHARD_IMAGE_OUTPUT: artifacts/images
          PGSHARD_IMAGE_TAG: dev
          PGSHARD_IMAGE_TARGETS: operator orchestrator pooler postgres-agent
        shell: bash
        run: |
          set -euo pipefail
          make images
          for component in operator orchestrator pooler postgres-agent; do
            docker load --input "artifacts/images/pgshard-${component}.tar"
            image="pgshard/${component}:dev"
            test "$(docker image inspect --format '{{ index .Config.Labels \"org.opencontainers.image.revision\" }}' "$image")" = "$PGSHARD_GIT_SHA"
            test "$(docker image inspect --format '{{ index .Config.Labels \"org.opencontainers.image.version\" }}' "$image")" = "$PGSHARD_BUILD_VERSION"
          done
      - name: Create disposable Kubernetes cluster
        run: |
          go install sigs.k8s.io/kind@v0.32.0
          kind create cluster \
            --name pgshard-manager \
            --image kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5 \
            --wait 90s
          test "$(kubectl version --output=json | jq --raw-output '.serverVersion.minor')" = "36"
          # Pull the digest through the node's CRI. Importing this image from
          # Docker's containerd store can leave KIND with a transient source
          # alias that kubelet cannot resolve when it creates a container.
          docker exec pgshard-manager-control-plane crictl pull \
            docker.io/library/postgres@sha256:311136771dca6826c3b6e691ebf8cb6e896e165074bc57a728f9619f25f0c4c7
          kind load docker-image \
            pgshard/operator:dev \
            pgshard/orchestrator:dev \
            pgshard/pooler:dev \
            pgshard/postgres-agent:dev \
            --name pgshard-manager
      - name: Install the self-managed admission manager
        run: |
          kubectl apply --server-side --field-manager=pgshard-ci -k operator/config/admission
          kubectl rollout status \
            --namespace pgshard-system \
            deployment/pgshard-controller-manager \
            --timeout=180s
      - name: Verify admission and real reconciliation
        working-directory: operator
        env:
          PGSHARD_KIND_MANAGER_E2E: "true"
          PGSHARD_POSTGRES_BOOTSTRAP_E2E: "true"
          PGSHARD_POSTGRES_BOOTSTRAP_IMAGE: pgshard/postgres-agent:dev
        run: |
          go test -race -count=1 -timeout=30m \
            -run '^TestKIND(AdmissionWebhooksUseManagedTLSAndRejectUnsafeSpec|AdmissionRemainsAvailableDuringCompatibleManagerRestart|ManagerReconcilesFailClosedDevelopmentCluster|ManagerRunsSingleMemberPostgreSQL18Primaries|ManagerDeletePolicyReleasesBoundPostgreSQLPVC|ManagerRetainPolicyReleasesExplicitlyDeletingPostgreSQLPVC)$' \
            ./internal/controller
          go test -race -count=1 -timeout=10m \
            -run '^TestPostgreSQLBootstrapDockerRecoveryAndConflict$' \
            ./internal/resources
      - name: Capture manager diagnostics
        if: failure()
        run: |
          kubectl get pods,deployments,statefulsets --all-namespaces --show-labels
          kubectl logs --namespace pgshard-system deployment/pgshard-controller-manager --all-containers --tail=200 || true
      - name: Delete disposable Kubernetes cluster
        if: always()
        run: kind delete cluster --name pgshard-manager

  website:
    name: Documentation website
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Run documentation checks
        run: make docs-check
      - name: Store Pages candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-site
          path: website/build
          if-no-files-found: error
          retention-days: 1

  ui:
    name: Admin UI
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Check and build UI
        working-directory: ui
        shell: bash
        run: |
          set -euo pipefail
          for script in lint typecheck test build; do
            if ! node -e "process.exit(require('./package.json').scripts?.['$script'] ? 0 : 1)"; then
              echo "ui/package.json must define the '$script' script" >&2
              exit 1
            fi
            npm run "$script"
          done

  integration:
    name: Integration / ${{ matrix.suite }}
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [protocol, catalog, pgoutput]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run integration suite
        env:
          PGSHARD_INTEGRATION_SUITE: ${{ matrix.suite }}
        run: cargo run --locked -p pgshard-integration-tests -- --suite "$PGSHARD_INTEGRATION_SUITE"

  images:
    name: Build local test images
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up archive-capable Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Build local image archives without publishing
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
          PGSHARD_IMAGE_OUTPUT: artifacts/images
          PGSHARD_IMAGE_TAG: ci
          PGSHARD_IMAGE_TARGETS: agent operator orchestrator pooler
        run: make images
      - name: Verify non-root image entrypoints
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          for component in agent operator orchestrator pooler; do
            docker load --input "artifacts/images/pgshard-${component}.tar"
            image="pgshard/${component}:ci"
            test "$(docker inspect --format '{{.Config.User}}' "$image")" = "10001:10001"
            test "$(docker inspect --format '{{.Os}}/{{.Architecture}}' "$image")" = "linux/amd64"
            test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$image")" = "$PGSHARD_BUILD_VERSION"
            test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image")" = "$PGSHARD_GIT_SHA"
            docker run --rm --platform linux/amd64 --network none --read-only \
              --cap-drop ALL --security-opt no-new-privileges \
              "$image" --help >/dev/null
          done

  agent-postgres:
    name: Agent / PostgreSQL 18 lifecycle
    needs: changes
    if: needs.changes.outputs.postgres_agent == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up local-image Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Build the local PostgreSQL agent without publishing
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
          PGSHARD_IMAGE_OUTPUT: artifacts/images
          PGSHARD_IMAGE_TAG: ci
          PGSHARD_IMAGE_TARGETS: postgres-agent
        run: make images
      - name: Verify the PostgreSQL agent image
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          docker load --input artifacts/images/pgshard-postgres-agent.tar
          image="pgshard/postgres-agent:ci"
          test "$(docker inspect --format '{{.Config.User}}' "$image")" = "999:999"
          test "$(docker inspect --format '{{.Os}}/{{.Architecture}}' "$image")" = "linux/amd64"
          test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$image")" = "$PGSHARD_BUILD_VERSION"
          test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image")" = "$PGSHARD_GIT_SHA"
          test "$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$image" | sed -n 's/^PG_MAJOR=//p')" = "18"
          expected_migration_sha="$(sha256sum crates/pgshard-catalog/migrations/0001_shardschema.sql | awk '{print $1}')"
          image_migration_sha="$(docker run --rm --platform linux/amd64 --network none --read-only \
            --cap-drop ALL --security-opt no-new-privileges \
            --entrypoint sha256sum "$image" \
            /usr/share/pgshard/migrations/0001_shardschema.sql | awk '{print $1}')"
          test "$image_migration_sha" = "$expected_migration_sha"
          docker run --rm --platform linux/amd64 --network none --read-only \
            --cap-drop ALL --security-opt no-new-privileges \
            "$image" --help >/dev/null
      - name: Exercise real PostgreSQL 18 quarantine and recovery
        shell: bash
        run: |
          set -euo pipefail
          image="pgshard/postgres-agent:ci"
          volume="pgshard-pgdata-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          runtime_volume="pgshard-runtime-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          external_wal_volume="pgshard-external-wal-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          standby_volume="pgshard-standby-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          container="pgshard-agent-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          regular_mount_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/pgshard-regular-mount.XXXXXX")"
          regular_mount_file="$regular_mount_dir/PG_VERSION"
          : > "$regular_mount_file"
          cleanup() {
            docker rm --force "$container" >/dev/null 2>&1 || true
            docker rm --force "${container}-marker" >/dev/null 2>&1 || true
            docker rm --force "${container}-mount" >/dev/null 2>&1 || true
            docker rm --force "${container}-external-pid" >/dev/null 2>&1 || true
            docker rm --force "${container}-control" >/dev/null 2>&1 || true
            docker rm --force "${container}-second" >/dev/null 2>&1 || true
            docker volume rm --force "$volume" >/dev/null 2>&1 || true
            docker volume rm --force "$runtime_volume" >/dev/null 2>&1 || true
            docker volume rm --force "$external_wal_volume" >/dev/null 2>&1 || true
            docker volume rm --force "$standby_volume" >/dev/null 2>&1 || true
            rm -f "$regular_mount_file"
            rmdir "$regular_mount_dir" 2>/dev/null || true
          }
          trap cleanup EXIT

          docker volume create "$volume" >/dev/null
          docker volume create "$runtime_volume" >/dev/null
          docker volume create "$external_wal_volume" >/dev/null
          docker volume create "$standby_volume" >/dev/null
          docker run --rm --user 0:0 --entrypoint /bin/chown \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" 999:999 /var/lib/postgresql/18/docker
          docker run --rm --user 0:0 --entrypoint /bin/chown \
            --volume "$standby_volume:/standby" \
            "$image" 999:999 /standby
          docker run --rm --user 0:0 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            --volume "$external_wal_volume:/external-wal" \
            "$image" -ceu \
            'chown 999:999 /run/pgshard /external-wal; chmod 0700 /run/pgshard /external-wal; printf "%s\n" external-pid-sentinel > /run/pgshard/deployment.pid; chown 999:999 /run/pgshard/deployment.pid; chmod 0600 /run/pgshard/deployment.pid'
          docker run --rm --user 999:999 \
            --entrypoint /usr/lib/postgresql/18/bin/initdb \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" \
            -D /var/lib/postgresql/18/docker \
            --auth-local=trust --auth-host=reject --encoding=UTF8 --locale=C \
            --set wal_level=logical

          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            --tmpfs /run/slot-init:rw,uid=999,gid=999,mode=0700 \
            "$image" -ceu '
              pg_ctl -D "$PGDATA" -o "-c listen_addresses= -c unix_socket_directories=/run/slot-init -c external_pid_file=/run/slot-init/postmaster.external.pid" -l /tmp/slot-init.log -w start >/dev/null || { cat /tmp/slot-init.log >&2; exit 1; }
              trap '\''pg_ctl -D "$PGDATA" -m immediate -w stop >/dev/null 2>&1 || true'\'' EXIT
              psql -h /run/slot-init -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_create_physical_replication_slot('\''physical_keep'\'', true)" >/dev/null
              psql -h /run/slot-init -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_create_logical_replication_slot('\''logical_keep'\'', '\''pgoutput'\'')" >/dev/null
              psql -h /run/slot-init -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_switch_wal(); SELECT pg_switch_wal()" >/dev/null
              pg_ctl -D "$PGDATA" -m fast -w stop >/dev/null
              trap - EXIT
            '

          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/primary" \
            --volume "$standby_volume:/standby" \
            --tmpfs /run/control:rw,uid=999,gid=999,mode=0700 \
            "$image" -ceu '
              mkdir -m 0700 /run/control/primary /run/control/standby
              primary_options="-c data_directory=/primary -c listen_addresses= -c unix_socket_directories=/run/control/primary -c external_pid_file=/run/control/primary/postmaster.external.pid"
              standby_options="-c data_directory=/standby -c listen_addresses= -c unix_socket_directories=/run/control/standby -c external_pid_file=/run/control/standby/postmaster.external.pid"
              pg_ctl -D /primary -o "$primary_options" -l /tmp/control-primary.log -w start >/dev/null || { cat /tmp/control-primary.log >&2; exit 1; }
              trap "pg_ctl -D /standby -m immediate -w stop >/dev/null 2>&1 || true; pg_ctl -D /primary -m immediate -w stop >/dev/null 2>&1 || true" EXIT
              pg_basebackup -h /run/control/primary -D /standby -X stream -R -c fast
              chmod 0700 /standby
              pg_ctl -D /standby -o "$standby_options" -l /tmp/control-standby.log -w start >/dev/null || { cat /tmp/control-standby.log >&2; exit 1; }
              pg_isready -q -h /run/control/standby -p 5432
              pg_ctl -D /standby -m fast -w stop >/dev/null
              pg_ctl -D /primary -m fast -w stop >/dev/null
              trap - EXIT
            '

          test "$(docker run --rm --user 999:999 \
            --entrypoint /usr/lib/postgresql/18/bin/pg_controldata \
            --volume "$standby_volume:/standby" \
            "$image" /standby \
            | sed -n 's/^Database cluster state: *//p')" = "shut down in recovery"
          docker run --rm --user 999:999 --entrypoint /bin/rm \
            --volume "$standby_volume:/standby" \
            "$image" /standby/standby.signal
          for recovery_state in "shut down in recovery" "in archive recovery"; do
            set +e
            control_output="$(timeout --signal=TERM --kill-after=1s 5s \
              docker run --rm --name "${container}-control" --user 999:999 \
                --network none --read-only --cap-drop ALL \
                --security-opt no-new-privileges \
                --tmpfs /run/pgshard:rw,uid=999,gid=999,mode=0700 \
                --volume "$standby_volume:/var/lib/postgresql/18/docker" \
                --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
                --env PGSHARD_CLUSTER_ID=cluster-1 \
                --env PGSHARD_SHARD_ID=0 \
                --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
                --env PGSHARD_POSTGRES_MODE=quarantine \
                "$image" 2>&1)"
            control_status=$?
            set -e
            docker rm --force "${container}-control" >/dev/null 2>&1 || true
            test "$control_status" = 1
            grep --quiet --fixed-strings 'RecoveryControlState' <<<"$control_output"
            grep --quiet --fixed-strings "$recovery_state" <<<"$control_output"
            if [[ "$recovery_state" = "shut down in recovery" ]]; then
              docker run --rm --user 999:999 --entrypoint /usr/bin/touch \
                --volume "$standby_volume:/standby" \
                "$image" /standby/standby.signal
              docker run --rm --user 999:999 --entrypoint /bin/sh \
                --volume "$volume:/primary" \
                --volume "$standby_volume:/standby" \
                --tmpfs /run/control:rw,uid=999,gid=999,mode=0700 \
                "$image" -ceu '
                  mkdir -m 0700 /run/control/primary /run/control/standby
                  primary_options="-c data_directory=/primary -c listen_addresses= -c unix_socket_directories=/run/control/primary -c external_pid_file=/run/control/primary/postmaster.external.pid"
                  standby_options="-c data_directory=/standby -c listen_addresses= -c unix_socket_directories=/run/control/standby -c external_pid_file=/run/control/standby/postmaster.external.pid"
                  pg_ctl -D /primary -o "$primary_options" -l /tmp/control-primary.log -w start >/dev/null || { cat /tmp/control-primary.log >&2; exit 1; }
                  trap "pg_ctl -D /standby -m immediate -w stop >/dev/null 2>&1 || true; pg_ctl -D /primary -m immediate -w stop >/dev/null 2>&1 || true" EXIT
                  pg_ctl -D /standby -o "$standby_options" -l /tmp/control-standby.log -w start >/dev/null || { cat /tmp/control-standby.log >&2; exit 1; }
                  pg_isready -q -h /run/control/standby -p 5432
                  pg_ctl -D /standby -m immediate -w stop >/dev/null
                  pg_ctl -D /primary -m fast -w stop >/dev/null
                  trap - EXIT
                '
              test "$(docker run --rm --user 999:999 \
                --entrypoint /usr/lib/postgresql/18/bin/pg_controldata \
                --volume "$standby_volume:/standby" \
                "$image" /standby \
                | sed -n 's/^Database cluster state: *//p')" = "in archive recovery"
              docker run --rm --user 999:999 --entrypoint /bin/rm \
                --volume "$standby_volume:/standby" \
                "$image" /standby/standby.signal
            fi
          done

          for mount_path in pg_wal base/1; do
            set +e
            mount_output="$(timeout --signal=TERM --kill-after=1s 5s \
              docker run --rm --name "${container}-mount" --user 999:999 \
                --network none --read-only --cap-drop ALL \
                --security-opt no-new-privileges \
                --tmpfs /run/pgshard:rw,uid=999,gid=999,mode=0700 \
                --volume "$volume:/var/lib/postgresql/18/docker" \
                --volume "$external_wal_volume:/var/lib/postgresql/18/docker/$mount_path" \
                --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
                --env PGSHARD_CLUSTER_ID=cluster-1 \
                --env PGSHARD_SHARD_ID=0 \
                --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
                --env PGSHARD_POSTGRES_MODE=quarantine \
                "$image" 2>&1)"
            mount_status=$?
            set -e
            docker rm --force "${container}-mount" >/dev/null 2>&1 || true
            test "$mount_status" = 1
            grep --quiet --fixed-strings 'ExternalMount' <<<"$mount_output"
            grep --quiet --fixed-strings "$mount_path" <<<"$mount_output"
          done

          docker run --rm --user 0:0 --entrypoint /bin/sh \
            --volume "$regular_mount_file:/mount-probe" \
            "$image" -ceu \
            'printf "18\n" > /mount-probe; chown 999:999 /mount-probe; chmod 0600 /mount-probe'
          set +e
          mount_output="$(timeout --signal=TERM --kill-after=1s 5s \
            docker run --rm --name "${container}-mount" --user 999:999 \
              --network none --read-only --cap-drop ALL \
              --security-opt no-new-privileges \
              --tmpfs /run/pgshard:rw,uid=999,gid=999,mode=0700 \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              --mount "type=bind,source=$regular_mount_file,target=/var/lib/postgresql/18/docker/PG_VERSION,readonly" \
              --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
              --env PGSHARD_CLUSTER_ID=cluster-1 \
              --env PGSHARD_SHARD_ID=0 \
              --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
              --env PGSHARD_POSTGRES_MODE=quarantine \
              "$image" 2>&1)"
          mount_status=$?
          set -e
          docker rm --force "${container}-mount" >/dev/null 2>&1 || true
          test "$mount_status" = 1
          grep --quiet --fixed-strings 'ExternalMount' <<<"$mount_output"
          grep --quiet --fixed-strings 'PG_VERSION' <<<"$mount_output"

          for marker in standby.signal recovery.signal backup_label tablespace_map; do
            docker run --rm --user 999:999 --entrypoint /bin/sh \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              "$image" -ceu ': > "$PGDATA/$1"' -- "$marker"
            set +e
            marker_output="$(timeout --signal=TERM --kill-after=1s 5s \
              docker run --rm --name "${container}-marker" --user 999:999 \
                --network none --read-only --cap-drop ALL \
                --security-opt no-new-privileges \
                --tmpfs /run/pgshard:rw,uid=999,gid=999,mode=0700 \
                --volume "$volume:/var/lib/postgresql/18/docker" \
                --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
                --env PGSHARD_CLUSTER_ID=cluster-1 \
                --env PGSHARD_SHARD_ID=0 \
                --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
                --env PGSHARD_POSTGRES_MODE=quarantine \
                "$image" 2>&1)"
            marker_status=$?
            set -e
            docker rm --force "${container}-marker" >/dev/null 2>&1 || true
            test "$marker_status" = 1
            grep --quiet --fixed-strings 'RecoveryStatePresent' <<<"$marker_output"
            grep --quiet --fixed-strings "$marker" <<<"$marker_output"
            docker run --rm --user 999:999 --entrypoint /usr/bin/test \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              "$image" ! -e /var/lib/postgresql/18/docker/postmaster.pid
            docker run --rm --user 999:999 --entrypoint /bin/rm \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              "$image" "/var/lib/postgresql/18/docker/$marker"
          done

          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" -ceu \
            'printf "%s\n" \
              "primary_conninfo = '\''host=198.51.100.1 port=5432'\''" \
              "data_directory = '\''/var/lib/postgresql/redirected'\''" \
              "external_pid_file = '\''/run/pgshard/deployment.pid'\''" \
              "idle_replication_slot_timeout = '\''1s'\''" \
              "max_slot_wal_keep_size = 0" \
              "ignore_invalid_pages = on" \
              "data_sync_retry = on" \
              "ignore_checksum_failure = on" \
              "zero_damaged_pages = on" \
              >> "$PGDATA/postgresql.conf"'
          pending_wal=000000010000000000000000
          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" -ceu \
            'truncate -s 16777216 "$PGDATA/pg_wal/$1"; : > "$PGDATA/pg_wal/archive_status/$1.ready"' \
            -- "$pending_wal"

          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" -ceu '
              mkdir -p /run/pgshard/postgres
              chmod 0700 /run/pgshard/postgres
              ln -s ../deployment.pid /run/pgshard/postgres/postmaster.external.pid
            '
          set +e
          external_pid_output="$(timeout --signal=TERM --kill-after=1s 5s \
            docker run --rm --name "${container}-external-pid" --user 999:999 \
              --network none --read-only --cap-drop ALL \
              --security-opt no-new-privileges \
              --volume "$runtime_volume:/run/pgshard" \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
              --env PGSHARD_CLUSTER_ID=cluster-1 \
              --env PGSHARD_SHARD_ID=0 \
              --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
              --env PGSHARD_POSTGRES_MODE=quarantine \
              "$image" 2>&1)"
          external_pid_status=$?
          set -e
          docker rm --force "${container}-external-pid" >/dev/null 2>&1 || true
          test "$external_pid_status" = 1
          grep --quiet --fixed-strings 'Symlink' <<<"$external_pid_output"
          grep --quiet --fixed-strings 'postmaster.external.pid' <<<"$external_pid_output"
          test "$(docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" -ceu 'cat /run/pgshard/deployment.pid')" = external-pid-sentinel
          docker run --rm --user 999:999 --entrypoint /bin/rm \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" /run/pgshard/postgres/postmaster.external.pid

          start_agent() {
            docker run --detach --name "$container" --user 999:999 \
              --read-only --cap-drop ALL --security-opt no-new-privileges \
              --publish 127.0.0.1::8080 \
              --volume "$runtime_volume:/run/pgshard" \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              --env PGSHARD_HTTP_BIND=0.0.0.0:8080 \
              --env PGSHARD_CLUSTER_ID=cluster-1 \
              --env PGSHARD_SHARD_ID=0 \
              --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-0 \
              --env PGSHARD_POSTGRES_MODE=quarantine \
              --env PGSHARD_POSTGRES_SMART_SHUTDOWN_MS=1000 \
              --env PGSHARD_POSTGRES_FAST_SHUTDOWN_MS=5000 \
              --env PGSHARD_POSTGRES_IMMEDIATE_SHUTDOWN_MS=1000 \
              "$image" >/dev/null
          }
          wait_ready() {
            local port=""
            for _ in $(seq 1 100); do
              if [[ -z "$port" ]]; then
                port="$(docker port "$container" 8080/tcp 2>/dev/null \
                  | sed -n 's/.*://p' || true)"
              fi
              if [[ "$(docker inspect --format '{{.State.Running}}' "$container")" != true ]]; then
                docker logs "$container" >&2
                return 1
              fi
              if [[ -n "$port" ]] && curl --fail --silent --show-error \
                --connect-timeout 1 --max-time 2 \
                "http://127.0.0.1:${port}/status" \
                | jq --exit-status '.postgres_process == "running_quarantined"' >/dev/null \
                && docker exec "$container" /usr/lib/postgresql/18/bin/pg_isready \
                  -q -h /run/pgshard/postgres -p 5432; then
                test "$(curl --silent --show-error --connect-timeout 1 --max-time 2 \
                  --output /dev/null \
                  --write-out '%{http_code}' \
                  "http://127.0.0.1:${port}/readyz")" = 503
                test "$(curl --silent --show-error --connect-timeout 1 --max-time 2 \
                  "http://127.0.0.1:${port}/readyz" \
                  | jq --raw-output '.reason')" = postgres_quarantined
                if docker exec "$container" /usr/lib/postgresql/18/bin/pg_isready \
                  -q -h 127.0.0.1 -p 5432; then
                  echo "quarantined PostgreSQL unexpectedly accepted TCP" >&2
                  exit 1
                fi
                postmaster_arguments="$(docker exec "$container" /bin/sh -ceu \
                  'pid="$(head -n 1 "$PGDATA/postmaster.pid")"; tr "\000" "\n" < "/proc/$pid/cmdline"')"
                for expected in \
                  data_directory=/var/lib/postgresql/18/docker \
                  hba_file=/etc/pgshard/quarantine.pg_hba.conf \
                  external_pid_file=/run/pgshard/postgres/postmaster.external.pid \
                  listen_addresses= unix_socket_group= primary_conninfo= primary_slot_name= \
                  restore_command= archive_mode=on archive_command= archive_library= \
                  max_wal_senders=0 \
                  max_logical_replication_workers=0 \
                  idle_replication_slot_timeout=0 max_slot_wal_keep_size=-1 \
                  fsync=on full_page_writes=on ignore_invalid_pages=off \
                  data_sync_retry=off ignore_checksum_failure=off zero_damaged_pages=off; do
                  grep --quiet --fixed-strings --line-regexp -- "$expected" \
                    <<<"$postmaster_arguments"
                done
                docker exec "$container" /usr/bin/test \
                  -e /var/lib/postgresql/18/docker/postmaster.pid
                docker exec "$container" /usr/bin/test \
                  ! -e /var/lib/postgresql/redirected/postmaster.pid
                test "$(docker exec "$container" /bin/sh -ceu \
                  'cat /run/pgshard/deployment.pid')" = external-pid-sentinel
                set +e
                sql_output="$(docker exec "$container" \
                  /usr/lib/postgresql/18/bin/psql -h /run/pgshard/postgres \
                  -d postgres -Atqc 'CREATE TABLE quarantine_must_reject(i int)' 2>&1)"
                sql_status=$?
                set -e
                test "$sql_status" -ne 0
                grep --quiet --fixed-strings 'pg_hba.conf rejects connection' <<<"$sql_output"
                return
              fi
              sleep 0.1
            done
            docker logs "$container" >&2
            return 1
          }

          start_agent
          wait_ready
          first_postmaster_pid="$(docker exec "$container" /bin/sh -ceu \
            'head -n 1 "$PGDATA/postmaster.pid"')"
          first_external_pid="$(docker exec "$container" /bin/sh -ceu \
            'cat /run/pgshard/postgres/postmaster.external.pid')"
          test "$first_external_pid" = "$first_postmaster_pid"
          set +e
          second_output="$(timeout --signal=TERM --kill-after=1s 5s \
            docker run --rm --name "${container}-second" --user 999:999 \
              --network none --read-only --cap-drop ALL \
              --security-opt no-new-privileges \
              --tmpfs /run/pgshard:rw,uid=999,gid=999,mode=0700 \
              --volume "$volume:/var/lib/postgresql/18/docker" \
              --env PGSHARD_HTTP_BIND=127.0.0.1:8080 \
              --env PGSHARD_CLUSTER_ID=cluster-1 \
              --env PGSHARD_SHARD_ID=0 \
              --env PGSHARD_INSTANCE_ID=cluster-1-shard-0-1 \
              --env PGSHARD_POSTGRES_MODE=quarantine \
              "$image" 2>&1)"
          second_status=$?
          set -e
          docker rm --force "${container}-second" >/dev/null 2>&1 || true
          test "$second_status" = 1
          grep --quiet --fixed-strings 'SupervisorLockHeld' <<<"$second_output"
          test "$(docker inspect --format '{{.State.Running}}' "$container")" = true
          test "$(docker exec "$container" /bin/sh -ceu \
            'head -n 1 "$PGDATA/postmaster.pid"')" = "$first_postmaster_pid"

          stopped_postgres_child="$(docker exec "$container" /bin/sh -ceu '
            postmaster="$1"
            for child in $(cat "/proc/$postmaster/task/$postmaster/children"); do
              status="/proc/$child/status"
              test -r "$status" || continue
              parent="$(sed -n "s/^PPid:[[:space:]]*//p" "$status" | tr -d "[:space:]")"
              test "$parent" = "$postmaster" || continue
              namespace_pid=""
              for value in $(sed -n "s/^NSpid:[[:space:]]*//p" "$status"); do
                namespace_pid="$value"
              done
              namespace_group=""
              for value in $(sed -n "s/^NSpgid:[[:space:]]*//p" "$status"); do
                namespace_group="$value"
              done
              test "$namespace_pid" = "$child" || continue
              test "$namespace_group" = "$child" || continue
              test "$namespace_group" != "$postmaster" || continue
              kill -STOP "$child"
              for _ in $(seq 1 50); do
                state="$(sed -n "s/^State:[[:space:]]*\([A-Za-z]\).*/\1/p" "$status" 2>/dev/null || true)"
                case "$state" in
                  T|t) printf "%s\n" "$child"; exit 0 ;;
                esac
                sleep 0.02
              done
              kill -CONT "$child" 2>/dev/null || true
            done
            echo "no stable setsid PostgreSQL child was available" >&2
            exit 1
          ' -- "$first_postmaster_pid")"

          docker exec "$container" /bin/sh -ceu \
            'kill -KILL "$(head -n 1 "$PGDATA/postmaster.pid")"'
          for _ in $(seq 1 100); do
            test "$(docker inspect --format '{{.State.Running}}' "$container")" = false && break
            sleep 0.1
          done
          test "$(docker inspect --format '{{.State.Running}}' "$container")" = false
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container")" -ne 0
          agent_logs="$(docker logs "$container" 2>&1)"
          # ANSI CSI colors have variable-length numeric parameters, which
          # cannot be expressed safely with Bash's fixed-pattern replacement.
          # shellcheck disable=SC2001
          agent_logs="$(sed $'s/\x1b\\[[0-9;]*m//g' <<<"$agent_logs")"
          grep --quiet --extended-regexp \
            "killing adopted PostgreSQL descendant.*pid=${stopped_postgres_child}([^[:digit:]]|$)" \
            <<<"$agent_logs"
          docker rm "$container" >/dev/null
          test "$(docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" -ceu 'cat /run/pgshard/postgres/postmaster.external.pid')" \
            = "$first_external_pid"

          replacement_external_pid=2147483647
          test "$replacement_external_pid" != "$first_external_pid"
          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" -ceu '
              printf "%s\n" "$1" > /run/pgshard/postgres/postmaster.external.pid
              chmod 0644 /run/pgshard/postgres/postmaster.external.pid
              test "$(cat /run/pgshard/postgres/postmaster.external.pid)" = "$1"
            ' -- "$replacement_external_pid"

          start_agent
          wait_ready
          second_postmaster_pid="$(docker exec "$container" /bin/sh -ceu \
            'head -n 1 "$PGDATA/postmaster.pid"')"
          second_external_pid="$(docker exec "$container" /bin/sh -ceu \
            'cat /run/pgshard/postgres/postmaster.external.pid')"
          test "$second_external_pid" = "$second_postmaster_pid"
          test "$second_external_pid" != "$replacement_external_pid"
          docker stop --time 10 "$container" >/dev/null
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container")" = 0
          docker run --rm --user 999:999 --entrypoint /usr/bin/test \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" ! -e /var/lib/postgresql/18/docker/postmaster.pid
          docker run --rm --user 999:999 --entrypoint /usr/bin/test \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" ! -e /run/pgshard/postgres/postmaster.external.pid
          docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            "$image" -ceu \
            'test -f "$PGDATA/pg_wal/$1"; test -f "$PGDATA/pg_wal/archive_status/$1.ready"' \
            -- "$pending_wal"
          test "$(docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$runtime_volume:/run/pgshard" \
            "$image" -ceu 'cat /run/pgshard/deployment.pid')" = external-pid-sentinel

          slot_state="$(docker run --rm --user 999:999 --entrypoint /bin/sh \
            --volume "$volume:/var/lib/postgresql/18/docker" \
            --tmpfs /run/slot-check:rw,uid=999,gid=999,mode=0700 \
            "$image" -ceu '
              options="-c data_directory=$PGDATA -c listen_addresses= -c unix_socket_directories=/run/slot-check -c external_pid_file=/run/slot-check/postmaster.external.pid -c idle_replication_slot_timeout=0 -c max_slot_wal_keep_size=-1 -c ignore_invalid_pages=off -c data_sync_retry=off -c ignore_checksum_failure=off -c zero_damaged_pages=off"
              pg_ctl -D "$PGDATA" -o "$options" -l /tmp/slot-check.log -w start >/dev/null
              trap '\''pg_ctl -D "$PGDATA" -m immediate -w stop >/dev/null 2>&1 || true'\'' EXIT
              psql -h /run/slot-check -d postgres -At -v ON_ERROR_STOP=1 -c "SELECT slot_name || '\''|'\'' || COALESCE(invalidation_reason, '\'''\'') FROM pg_replication_slots WHERE slot_name IN ('\''logical_keep'\'', '\''physical_keep'\'') ORDER BY slot_name"
              pg_ctl -D "$PGDATA" -m fast -w stop >/dev/null
              trap - EXIT
            ')"
          test "$slot_state" = $'logical_keep|\nphysical_keep|'

  kind:
    name: KIND / ${{ matrix.scenario }}
    needs: changes
    if: >-
      needs.changes.outputs.kind == 'true'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - bootstrap-routing
          - transactions-failover
          - backup-restore
          - ddl-reshard
          - observability
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run KIND scenario
        env:
          PGSHARD_E2E_SCENARIO: ${{ matrix.scenario }}
          PGSHARD_IMAGE_PUSH: "false"
        run: cargo run --locked -p pgshard-e2e -- --scenario "$PGSHARD_E2E_SCENARIO"

  performance:
    name: Performance / ${{ matrix.suite }}
    needs: changes
    if: needs.changes.outputs.performance == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [pooler-pgbouncer, pgoutput]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run performance suite
        env:
          PGSHARD_PERFORMANCE_SUITE: ${{ matrix.suite }}
          PGSHARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: cargo run --locked -p pgshard-bench -- --suite "$PGSHARD_PERFORMANCE_SUITE"
      - name: Store performance results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-${{ matrix.suite }}
          path: artifacts/performance/${{ matrix.suite }}
          if-no-files-found: error
          retention-days: 1

  aggregate:
    name: CI aggregate
    if: always()
    needs:
      - changes
      - repository-policy
      - rust-static
      - rust-test
      - catalog-postgres
      - orch-catalog-postgres
      - pgwire-postgres
      - pgwire-fuzz
      - planner-postgres
      - protobuf
      - go-operator
      - operator-kind
      - operator-kind-manager
      - website
      - ui
      - integration
      - images
      - agent-postgres
      - kind
      - performance
    runs-on: ubuntu-24.04
    steps:
      - name: Require every applicable job
        env:
          JOB_RESULTS: >-
            changes=${{ needs.changes.result }}
            repository-policy=${{ needs.repository-policy.result }}
            rust-static=${{ needs.rust-static.result }}
            rust-test=${{ needs.rust-test.result }}
            catalog-postgres=${{ needs.catalog-postgres.result }}
            orch-catalog-postgres=${{ needs.orch-catalog-postgres.result }}
            pgwire-postgres=${{ needs.pgwire-postgres.result }}
            pgwire-fuzz=${{ needs.pgwire-fuzz.result }}
            planner-postgres=${{ needs.planner-postgres.result }}
            protobuf=${{ needs.protobuf.result }}
            go-operator=${{ needs.go-operator.result }}
            operator-kind=${{ needs.operator-kind.result }}
            operator-kind-manager=${{ needs.operator-kind-manager.result }}
            website=${{ needs.website.result }}
            ui=${{ needs.ui.result }}
            integration=${{ needs.integration.result }}
            images=${{ needs.images.result }}
            agent-postgres=${{ needs.agent-postgres.result }}
            kind=${{ needs.kind.result }}
            performance=${{ needs.performance.result }}
        shell: bash
        run: |
          set -euo pipefail
          failed=false
          for result in $JOB_RESULTS; do
            state="${result#*=}"
            if [[ "$state" != success && "$state" != skipped ]]; then
              echo "Required job did not pass: $result" >&2
              failed=true
            fi
          done
          "$failed" && exit 1
          echo "All applicable CI jobs passed."

  release:
    name: Source-only SemVer release
    needs: aggregate
    if: >-
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' &&
        (github.ref == 'refs/heads/main' ||
         startsWith(github.ref, 'refs/tags/pgshard-ci-')))) &&
      needs.aggregate.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      checks: read
      contents: write
    concurrency:
      group: pgshard-source-release
      queue: max
    steps:
      - name: Validate temporary exact-SHA ref
        if: startsWith(github.ref, 'refs/tags/pgshard-ci-')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected_sha="${REF_NAME#pgshard-ci-}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$expected_sha" == "$GITHUB_SHA" ]]
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Configure public commit identity
        run: |
          git config user.name "andrew01234567890"
          git config user.email "13841202+andrew01234567890@users.noreply.github.com"
      - name: Publish tag and source-only GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: cargo run --locked -p pgshard-release -- publish --sha "$GITHUB_SHA"

  cleanup-dependabot-ci-ref:
    name: Clean temporary Dependabot CI ref
    needs: [aggregate, release]
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      startsWith(github.ref, 'refs/tags/pgshard-ci-') &&
      needs.aggregate.result == 'success' &&
      needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Validate temporary exact-SHA ref
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected_sha="${REF_NAME#pgshard-ci-}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$expected_sha" == "$GITHUB_SHA" ]]
      - name: Delete temporary ref after release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if ! output="$(gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$REF_NAME" 2>&1)"; then
            if [[ "$output" == *"Reference does not exist"* && "$output" == *"HTTP 422"* ]]; then
              echo "Temporary ref was already deleted by an equivalent exact-SHA run."
            else
              printf '%s\n' "$output" >&2
              exit 1
            fi
          fi

  pages:
    name: Deploy documentation to GitHub Pages
    needs: [changes, website, aggregate, release]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.website == 'true' &&
      needs.website.result == 'success' &&
      needs.aggregate.result == 'success' &&
      needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Download documentation site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pages-site
          path: _site
      - name: Package Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
