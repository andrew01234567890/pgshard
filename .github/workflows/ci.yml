name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  changes:
    name: Detect components
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
      catalog: ${{ steps.detect.outputs.catalog }}
      pgwire: ${{ steps.detect.outputs.pgwire }}
      planner: ${{ steps.detect.outputs.planner }}
      proto: ${{ steps.detect.outputs.proto }}
      go: ${{ steps.detect.outputs.go }}
      website: ${{ steps.detect.outputs.website }}
      website_exists: ${{ steps.detect.outputs.website_exists }}
      ui: ${{ steps.detect.outputs.ui }}
      integration: ${{ steps.detect.outputs.integration }}
      images: ${{ steps.detect.outputs.images }}
      kind: ${{ steps.detect.outputs.kind }}
      performance: ${{ steps.detect.outputs.performance }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed and available components
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail

          base=""
          force_all=false
          case "$EVENT_NAME" in
            pull_request) base="$PR_BASE_SHA" ;;
            push)
              if [[ -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
                base="$PUSH_BEFORE_SHA"
              fi
              ;;
            schedule|workflow_dispatch) force_all=true ;;
          esac

          if [[ -n "$base" ]] && git cat-file -e "${base}^{commit}" 2>/dev/null; then
            git diff --name-only "$base" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files"
          else
            git ls-files > "$RUNNER_TEMP/changed-files"
          fi

          changed() {
            "$force_all" || grep -Eq "$1" "$RUNNER_TEMP/changed-files"
          }

          exists_at_head_or_base() {
            [[ -e "$1" ]] || {
              [[ -n "$base" ]] && git cat-file -e "${base}:$1" 2>/dev/null
            }
          }

          emit_component() {
            local output="$1"
            local exists="$2"
            local pattern="$3"
            local value=false
            if [[ "$exists" == true ]] && changed "$pattern"; then
              value=true
            fi
            echo "${output}=${value}" >> "$GITHUB_OUTPUT"
          }

          rust_exists=false
          catalog_exists=false
          pgwire_exists=false
          planner_exists=false
          proto_exists=false
          go_exists=false
          website_exists=false
          ui_exists=false
          integration_exists=false
          images_exists=false
          kind_exists=false
          performance_exists=false

          exists_at_head_or_base Cargo.toml && rust_exists=true
          exists_at_head_or_base crates/pgshard-catalog/Cargo.toml && catalog_exists=true
          exists_at_head_or_base crates/pgshard-pgwire/Cargo.toml && pgwire_exists=true
          exists_at_head_or_base crates/pgshard-planner/Cargo.toml && planner_exists=true
          exists_at_head_or_base buf.yaml && proto_exists=true
          exists_at_head_or_base operator/go.mod && go_exists=true
          exists_at_head_or_base website/package.json && website_exists=true
          exists_at_head_or_base ui/package.json && ui_exists=true
          exists_at_head_or_base tests/integration/Cargo.toml && integration_exists=true
          exists_at_head_or_base deploy/docker-bake.hcl && images_exists=true
          exists_at_head_or_base tests/e2e/Cargo.toml && kind_exists=true
          exists_at_head_or_base benchmarks/Cargo.toml && performance_exists=true

          emit_component rust "$rust_exists" '(^|/)(Cargo\.(toml|lock)|rust-toolchain(\.toml)?|[^/]+\.rs)$|^crates/|^proto/|^deny\.toml$|^rustfmt\.toml$|^\.cargo/|^Makefile$|^\.github/workflows/'
          emit_component catalog "$catalog_exists" '^crates/pgshard-catalog/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component pgwire "$pgwire_exists" '^crates/pgshard-pgwire/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component planner "$planner_exists" '^crates/pgshard-planner/|^Cargo\.(toml|lock)$|^rust-toolchain(\.toml)?$|^Makefile$|^\.github/workflows/'
          emit_component proto "$proto_exists" '^buf\.yaml$|^proto/|^Makefile$|^\.github/workflows/'
          emit_component go "$go_exists" '^operator/|^proto/|^Makefile$|^\.github/workflows/'
          emit_component website "$website_exists" '^website/|^docs/|^Makefile$|^\.github/workflows/'
          emit_component ui "$ui_exists" '^ui/|^proto/|^Makefile$|^\.github/workflows/'
          emit_component integration "$integration_exists" '^tests/integration/|^crates/|^operator/|^proto/|^Makefile$|^\.github/workflows/'
          emit_component images "$images_exists" '^deploy/|^Dockerfile|/Dockerfile$|^\.dockerignore$|^Cargo\.(toml|lock)$|^rust-toolchain\.toml$|^rustfmt\.toml$|^crates/|^operator/|^ui/|^Makefile$|^\.github/workflows/'
          emit_component kind "$kind_exists" '^tests/e2e/|^deploy/|^charts/|^crates/|^operator/|^ui/|^Makefile$|^\.github/workflows/'
          emit_component performance "$performance_exists" '^benchmarks/|^crates/|^Cargo\.(toml|lock)$|^Makefile$|^\.github/workflows/'
          current_website_exists=false
          [[ -f website/package.json ]] && current_website_exists=true
          echo "website_exists=${current_website_exists}" >> "$GITHUB_OUTPUT"

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select actionlint Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: Validate workflow contracts
        run: make actions-check
      - name: Validate title and public content
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == pull_request ]]; then
            cargo run --locked -p pgshard-release -- validate --subject "$PR_TITLE"
            cargo run --locked -p pgshard-release -- audit --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"
          elif [[ "$EVENT_NAME" == push && -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            cargo run --locked -p pgshard-release -- validate
            cargo run --locked -p pgshard-release -- audit \
              --base "$PUSH_BEFORE_SHA" --head "$GITHUB_SHA" \
              --allow-github-squash-author
          else
            cargo run --locked -p pgshard-release -- validate
          fi

  rust-static:
    name: Rust / static checks
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: |
          set -euo pipefail
          rustup show active-toolchain
          rustup component add rustfmt clippy
      - name: Install pinned Rust policy tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2
          fallback: none
      - name: Run Rust static policy
        run: make rust-static

  rust-test:
    name: Rust / tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Run workspace tests
        run: make rust-test
      - name: Run optimized planner safety regressions
        if: needs.changes.outputs.planner == 'true'
        run: |
          cargo test --release --locked -p pgshard-planner small_stack
          cargo test --release --locked -p pgshard-planner --test log_redaction
      - name: Verify explicit identity from a source archive
        env:
          ARCHIVE_VERSION: 9.8.7-archive-test
        run: |
          archive_dir="$RUNNER_TEMP/source-archive"
          mkdir -p "$archive_dir"
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          PGSHARD_BUILD_VERSION="$ARCHIVE_VERSION" \
          PGSHARD_GIT_SHA="$GITHUB_SHA" \
          PGSHARD_EXPECTED_VERSION="$ARCHIVE_VERSION" \
          PGSHARD_EXPECTED_SHA="$GITHUB_SHA" \
            cargo test --locked -p pgshard-version
      - name: Verify tag-only build identity invalidation
        run: |
          tag_dir="$RUNNER_TEMP/tag-invalidation"
          mkdir -p "$tag_dir"
          git archive HEAD | tar -x -C "$tag_dir"
          cd "$tag_dir"
          git init --quiet --initial-branch=main
          git config user.name "pgshard CI"
          git config user.email "noreply@github.com"
          git add --all
          git commit --quiet --message "test: create archive fixture"
          fixture_sha="$(git rev-parse HEAD)"
          development_version="0.0.0-dev+${fixture_sha:0:12}"
          PGSHARD_EXPECTED_VERSION="$development_version" \
          PGSHARD_EXPECTED_SHA="$fixture_sha" \
            cargo test --locked -p pgshard-version
          git tag v9.8.7
          PGSHARD_EXPECTED_VERSION="9.8.7" \
          PGSHARD_EXPECTED_SHA="$fixture_sha" \
            cargo test --locked -p pgshard-version

  catalog-postgres:
    name: Catalog / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: shardschema
          POSTGRES_PASSWORD: pgshard-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shardschema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Exercise migration and activation contracts
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/shardschema
        run: make catalog-test

  planner-postgres:
    name: Planner / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.planner == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: pgshard-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Compare admitted syntax with PostgreSQL 18
        env:
          PGSHARD_TEST_DATABASE_URL: postgresql://postgres:pgshard-ci-only@127.0.0.1:5432/postgres
        run: make planner-postgres-test

  pgwire-postgres:
    name: Pgwire / PostgreSQL 18
    needs: changes
    if: needs.changes.outputs.pgwire == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_INITDB_ARGS: --set wal_level=logical --set max_prepared_transactions=10
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Decode real PostgreSQL 18 wire and persistent-slot controls
        env:
          PGSHARD_PGWIRE_TEST_ADDRESS: 127.0.0.1:5432
        run: make pgwire-postgres-test

  protobuf:
    name: Protobuf contracts
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install pinned Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: 1.71.0
          setup_only: true
          github_token: ${{ github.token }}
      - name: Validate protobuf contracts
        run: make proto-check
      - name: Reject protobuf breaking changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git cat-file -e "$BASE_SHA:buf.yaml" 2>/dev/null; then
            buf breaking --against ".git#ref=$BASE_SHA"
          else
            echo "No protobuf contract exists at the pull request base; skipping initial breaking comparison."
          fi

  go-operator:
    name: Go operator
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Validate operator
        run: make go-check

  operator-kind:
    name: Operator KIND deletion safety
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Create disposable Kubernetes cluster
        run: |
          go install sigs.k8s.io/kind@v0.32.0
          kind create cluster \
            --name pgshard-operator \
            --image kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5 \
            --wait 90s
          test "$(kubectl version --output=json | jq --raw-output '.serverVersion.minor')" = "36"
          kubectl apply --server-side --field-manager=pgshard-ci -f operator/config/crd/bases/pgshard.io_pgshardclusters.yaml
      - name: Verify UID-safe delete and same-name recreate
        working-directory: operator
        env:
          PGSHARD_KIND_E2E: "true"
        run: go test -race -count=1 -run '^TestKINDDeletionWaitsForPVCBeforeSameNameRecreate$' ./internal/controller
      - name: Delete disposable Kubernetes cluster
        if: always()
        run: kind delete cluster --name pgshard-operator

  operator-kind-manager:
    name: Operator KIND manager smoke
    needs: changes
    if: >-
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.images == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Set up local-image Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Build manager smoke images without publishing
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
          PGSHARD_IMAGE_OUTPUT: artifacts/images
          PGSHARD_IMAGE_TAG: dev
          PGSHARD_IMAGE_TARGETS: operator orchestrator pooler
        shell: bash
        run: |
          set -euo pipefail
          make images
          for component in operator orchestrator pooler; do
            docker load --input "artifacts/images/pgshard-${component}.tar"
          done
      - name: Create disposable Kubernetes cluster
        run: |
          go install sigs.k8s.io/kind@v0.32.0
          kind create cluster \
            --name pgshard-manager \
            --image kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5 \
            --wait 90s
          test "$(kubectl version --output=json | jq --raw-output '.serverVersion.minor')" = "36"
          kind load docker-image \
            pgshard/operator:dev \
            pgshard/orchestrator:dev \
            pgshard/pooler:dev \
            --name pgshard-manager
      - name: Install the certificate-free development manager
        run: |
          kubectl apply --server-side --field-manager=pgshard-ci -k operator/config/development
          kubectl rollout status \
            --namespace pgshard-system \
            deployment/pgshard-controller-manager \
            --timeout=120s
      - name: Verify real manager reconciliation stays fail closed
        working-directory: operator
        env:
          PGSHARD_KIND_MANAGER_E2E: "true"
        run: go test -race -count=1 -run '^TestKINDManagerReconcilesFailClosedDevelopmentCluster$' ./internal/controller
      - name: Capture manager diagnostics
        if: failure()
        run: |
          kubectl get pods,deployments,statefulsets --all-namespaces --show-labels
          kubectl logs --namespace pgshard-system deployment/pgshard-controller-manager --all-containers --tail=200 || true
      - name: Delete disposable Kubernetes cluster
        if: always()
        run: kind delete cluster --name pgshard-manager

  website:
    name: Documentation website
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Run documentation checks
        run: make docs-check
      - name: Store Pages candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-site
          path: website/build
          if-no-files-found: error
          retention-days: 1

  ui:
    name: Admin UI
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ui
        run: npm ci
      - name: Check and build UI
        working-directory: ui
        shell: bash
        run: |
          set -euo pipefail
          for script in lint typecheck test build; do
            if ! node -e "process.exit(require('./package.json').scripts?.['$script'] ? 0 : 1)"; then
              echo "ui/package.json must define the '$script' script" >&2
              exit 1
            fi
            npm run "$script"
          done

  integration:
    name: Integration / ${{ matrix.suite }}
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [protocol, catalog, pgoutput]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run integration suite
        env:
          PGSHARD_INTEGRATION_SUITE: ${{ matrix.suite }}
        run: cargo run --locked -p pgshard-integration-tests -- --suite "$PGSHARD_INTEGRATION_SUITE"

  images:
    name: Build local test images
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up archive-capable Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Build local image archives without publishing
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
          PGSHARD_IMAGE_OUTPUT: artifacts/images
          PGSHARD_IMAGE_TAG: ci
        run: make images
      - name: Verify non-root image entrypoints
        env:
          PGSHARD_BUILD_VERSION: 0.0.0-dev+ci.${{ github.sha }}
          PGSHARD_GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          for component in agent operator orchestrator pooler; do
            docker load --input "artifacts/images/pgshard-${component}.tar"
            image="pgshard/${component}:ci"
            test "$(docker inspect --format '{{.Config.User}}' "$image")" = "10001:10001"
            test "$(docker inspect --format '{{.Os}}/{{.Architecture}}' "$image")" = "linux/amd64"
            test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$image")" = "$PGSHARD_BUILD_VERSION"
            test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image")" = "$PGSHARD_GIT_SHA"
            docker run --rm --platform linux/amd64 --network none --read-only \
              --cap-drop ALL --security-opt no-new-privileges \
              "$image" --help >/dev/null
          done

  kind:
    name: KIND / ${{ matrix.scenario }}
    needs: changes
    if: >-
      needs.changes.outputs.kind == 'true'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - bootstrap-routing
          - transactions-failover
          - backup-restore
          - ddl-reshard
          - observability
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run KIND scenario
        env:
          PGSHARD_E2E_SCENARIO: ${{ matrix.scenario }}
          PGSHARD_IMAGE_PUSH: "false"
        run: cargo run --locked -p pgshard-e2e -- --scenario "$PGSHARD_E2E_SCENARIO"

  performance:
    name: Performance / ${{ matrix.suite }}
    needs: changes
    if: needs.changes.outputs.performance == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [pooler-pgbouncer, pgoutput]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run performance suite
        env:
          PGSHARD_PERFORMANCE_SUITE: ${{ matrix.suite }}
          PGSHARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: cargo run --locked -p pgshard-bench -- --suite "$PGSHARD_PERFORMANCE_SUITE"
      - name: Store performance results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-${{ matrix.suite }}
          path: artifacts/performance/${{ matrix.suite }}
          if-no-files-found: error
          retention-days: 1

  aggregate:
    name: CI aggregate
    if: always()
    needs:
      - changes
      - repository-policy
      - rust-static
      - rust-test
      - catalog-postgres
      - pgwire-postgres
      - planner-postgres
      - protobuf
      - go-operator
      - operator-kind
      - operator-kind-manager
      - website
      - ui
      - integration
      - images
      - kind
      - performance
    runs-on: ubuntu-24.04
    steps:
      - name: Require every applicable job
        env:
          JOB_RESULTS: >-
            changes=${{ needs.changes.result }}
            repository-policy=${{ needs.repository-policy.result }}
            rust-static=${{ needs.rust-static.result }}
            rust-test=${{ needs.rust-test.result }}
            catalog-postgres=${{ needs.catalog-postgres.result }}
            pgwire-postgres=${{ needs.pgwire-postgres.result }}
            planner-postgres=${{ needs.planner-postgres.result }}
            protobuf=${{ needs.protobuf.result }}
            go-operator=${{ needs.go-operator.result }}
            operator-kind=${{ needs.operator-kind.result }}
            operator-kind-manager=${{ needs.operator-kind-manager.result }}
            website=${{ needs.website.result }}
            ui=${{ needs.ui.result }}
            integration=${{ needs.integration.result }}
            images=${{ needs.images.result }}
            kind=${{ needs.kind.result }}
            performance=${{ needs.performance.result }}
        shell: bash
        run: |
          set -euo pipefail
          failed=false
          for result in $JOB_RESULTS; do
            state="${result#*=}"
            if [[ "$state" != success && "$state" != skipped ]]; then
              echo "Required job did not pass: $result" >&2
              failed=true
            fi
          done
          "$failed" && exit 1
          echo "All applicable CI jobs passed."

  release:
    name: Source-only SemVer release
    needs: aggregate
    if: >-
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' &&
        (github.ref == 'refs/heads/main' ||
         startsWith(github.ref, 'refs/tags/pgshard-ci-')))) &&
      needs.aggregate.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      checks: read
      contents: write
    concurrency:
      group: pgshard-source-release
      queue: max
    steps:
      - name: Validate temporary exact-SHA ref
        if: startsWith(github.ref, 'refs/tags/pgshard-ci-')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected_sha="${REF_NAME#pgshard-ci-}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$expected_sha" == "$GITHUB_SHA" ]]
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select repository Rust toolchain
        run: rustup show active-toolchain
      - name: Configure public commit identity
        run: |
          git config user.name "andrew01234567890"
          git config user.email "13841202+andrew01234567890@users.noreply.github.com"
      - name: Publish tag and source-only GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: cargo run --locked -p pgshard-release -- publish --sha "$GITHUB_SHA"

  cleanup-dependabot-ci-ref:
    name: Clean temporary Dependabot CI ref
    needs: [aggregate, release]
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      startsWith(github.ref, 'refs/tags/pgshard-ci-') &&
      needs.aggregate.result == 'success' &&
      needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Validate temporary exact-SHA ref
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected_sha="${REF_NAME#pgshard-ci-}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$expected_sha" == "$GITHUB_SHA" ]]
      - name: Delete temporary ref after release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if ! output="$(gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$REF_NAME" 2>&1)"; then
            if [[ "$output" == *"Reference does not exist"* && "$output" == *"HTTP 422"* ]]; then
              echo "Temporary ref was already deleted by an equivalent exact-SHA run."
            else
              printf '%s\n' "$output" >&2
              exit 1
            fi
          fi

  pages:
    name: Deploy documentation to GitHub Pages
    needs: [changes, website, aggregate, release]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.website == 'true' &&
      needs.website.result == 'success' &&
      needs.aggregate.result == 'success' &&
      needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Download documentation site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pages-site
          path: _site
      - name: Package Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
