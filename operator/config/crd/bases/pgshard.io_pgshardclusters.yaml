---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: pgshardclusters.pgshard.io
spec:
  group: pgshard.io
  names:
    kind: PgShardCluster
    listKind: PgShardClusterList
    plural: pgshardclusters
    shortNames:
    - pgsc
    singular: pgshardcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.shards
      name: Shards
      type: integer
    - jsonPath: .spec.membersPerShard
      name: Members
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PgShardClusterSpec describes one namespaced pgshard installation.
            properties:
              backup:
                properties:
                  repository:
                    properties:
                      filesystem:
                        properties:
                          persistentVolumeClaimName:
                            maxLength: 253
                            type: string
                        required:
                        - persistentVolumeClaimName
                        type: object
                      s3:
                        properties:
                          bucket:
                            maxLength: 255
                            minLength: 1
                            type: string
                          credentialsSecretRef:
                            description: |-
                              LocalObjectReference contains enough information to let you locate the
                              referenced object inside the same namespace.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          endpoint:
                            maxLength: 2048
                            type: string
                          prefix:
                            maxLength: 1024
                            type: string
                          region:
                            maxLength: 128
                            type: string
                        required:
                        - bucket
                        - credentialsSecretRef
                        type: object
                      type:
                        enum:
                        - S3
                        - Filesystem
                        type: string
                    required:
                    - type
                    type: object
                required:
                - repository
                type: object
              databases:
                description: |-
                  Databases declares immutable genesis database topologies. Database
                  lifecycle will move to PgShardDatabase without changing this placement
                  contract.
                items:
                  properties:
                    cells:
                      description: |-
                        Cells maps logical shard ordinal i to one exact physical cell ordinal.
                        Omitting it selects the first Shards cells. Reusing cells across different
                        databases is explicit shared-cell placement; cells within one database
                        must be unique.
                      items:
                        format: int32
                        maximum: 127
                        minimum: 0
                        type: integer
                      maxItems: 128
                      minItems: 1
                      type: array
                    name:
                      maxLength: 63
                      minLength: 1
                      type: string
                    shards:
                      description: |-
                        Shards is this database's logical shard count. Zero is defaulted to the
                        number of explicitly selected cells, or to every cluster cell when cells
                        is also omitted.
                      format: int32
                      maximum: 128
                      minimum: 1
                      type: integer
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: database name is reserved by PostgreSQL or pgshard
                    rule: '!(self.name in [''postgres'', ''shardschema'', ''template0'',
                      ''template1''])'
                  - message: database topology is immutable except for exact materialization
                      of legacy defaults
                    rule: self == oldSelf || (!has(oldSelf.shards) && !has(oldSelf.cells)
                      && has(self.shards) && has(self.cells) && self.shards == size(self.cells)
                      && self.cells.all(cell, cell == self.cells.indexOf(cell)))
                maxItems: 512
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              durability:
                default: Synchronous
                description: |-
                  Durability defaults to synchronous replication. Asynchronous is an explicit
                  durability downgrade and never disables PostgreSQL local WAL durability.
                enum:
                - Synchronous
                - Asynchronous
                type: string
              membersPerShard:
                default: 3
                description: |-
                  MembersPerShard is the number of physical PostgreSQL members per shard.
                  Milestone 1 supports the safe odd values 1, 3, and 5.
                enum:
                - 1
                - 3
                - 5
                format: int32
                type: integer
              observability:
                properties:
                  openTelemetryEndpoint:
                    maxLength: 2048
                    type: string
                  prometheus:
                    default: true
                    type: boolean
                  serviceMonitor:
                    default: false
                    type: boolean
                type: object
              pooler:
                properties:
                  scaling:
                    properties:
                      fixed:
                        properties:
                          replicas:
                            format: int32
                            maximum: 100
                            minimum: 1
                            type: integer
                        required:
                        - replicas
                        type: object
                      hpa:
                        properties:
                          maxReplicas:
                            default: 10
                            format: int32
                            maximum: 100
                            minimum: 2
                            type: integer
                          minReplicas:
                            default: 2
                            format: int32
                            minimum: 2
                            type: integer
                          targetCPUUtilizationPercentage:
                            default: 65
                            format: int32
                            maximum: 100
                            minimum: 1
                            type: integer
                        type: object
                      mode:
                        default: HPA
                        enum:
                        - HPA
                        - Fixed
                        type: string
                    type: object
                type: object
              postgresql:
                properties:
                  parameters:
                    additionalProperties:
                      type: string
                    description: |-
                      Parameters contains a deliberately small set of safe tuning overrides.
                      Durability-critical and operator-owned settings are rejected.
                    type: object
                  resources:
                    description: Resources must contain positive CPU and memory requests
                      and limits.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  version:
                    default: "18"
                    description: Version is the PostgreSQL major. Only PostgreSQL
                      18 is accepted.
                    enum:
                    - "18"
                    type: string
                required:
                - resources
                type: object
              services:
                properties:
                  r:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                  ro:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                  rw:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                type: object
              shards:
                default: 1
                description: |-
                  Shards is the number of physical PostgreSQL cells in the foundation API.
                  Each logical database maps its independently ordered hash ranges onto a
                  subset of these cells. The catalog remains on physical cell zero.
                format: int32
                maximum: 128
                minimum: 1
                type: integer
              storage:
                properties:
                  deletionPolicy:
                    default: Retain
                    description: |-
                      DeletionPolicy controls PostgreSQL data PVC handling when the cluster is
                      deleted. Retain is the safe default; Delete must be selected explicitly.
                    enum:
                    - Retain
                    - Delete
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: Size is the capacity of each PostgreSQL data volume.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: StorageClassName is used for PostgreSQL data volumes.
                    type: string
                required:
                - size
                type: object
                x-kubernetes-validations:
                - message: storage size is immutable except for a one-time upgrade
                    from a legacy size below 4Gi to at least 4Gi
                  optionalOldSelf: true
                  rule: '!oldSelf.hasValue() ? quantity(self.size).compareTo(quantity(''4Gi''))
                    >= 0 : quantity(self.size).compareTo(quantity(oldSelf.value().size))
                    == 0 || (quantity(oldSelf.value().size).compareTo(quantity(''4Gi''))
                    < 0 && quantity(self.size).compareTo(quantity(''4Gi'')) >= 0)'
                - message: storage class is immutable after cluster creation
                  rule: has(self.storageClassName) == has(oldSelf.storageClassName)
                    && (!has(self.storageClassName) || self.storageClassName == oldSelf.storageClassName)
                - message: deletion policy is immutable after cluster creation
                  rule: self.deletionPolicy == oldSelf.deletionPolicy
            required:
            - backup
            - postgresql
            - storage
            type: object
            x-kubernetes-validations:
            - message: shards is immutable until physical cell transitions are implemented
              rule: self.shards == oldSelf.shards
            - message: membersPerShard is immutable until membership transitions are
                implemented
              rule: self.membersPerShard == oldSelf.membersPerShard
            - message: durability is immutable until replication-mode transitions
                are implemented
              rule: self.durability == oldSelf.durability
            - message: databases is immutable until database lifecycle and online
                resharding are implemented
              rule: '!has(oldSelf.databases) ? !has(self.databases) || size(self.databases)
                == 0 : has(self.databases) && sets.equivalent(self.databases.map(database,
                database.name), oldSelf.databases.map(database, database.name))'
          status:
            description: |-
              PgShardClusterStatus never reports readiness until the operator has actually
              reconciled and observed the data plane.
            properties:
              catalogAccess:
                description: |-
                  CatalogAccess records the staged creation and API identity of the
                  catalog-only credential and TLS Secret. The operator first creates an empty
                  non-consumable Secret, checkpoints its UID, then atomically installs
                  immutable material and checkpoints its digests. A missing or replaced
                  checkpointed Secret requires explicit recovery.
                properties:
                  clientSHA256:
                    description: |-
                      ClientSHA256 binds the pooler's password and CA projection to the
                      checkpointed creation result.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  secretName:
                    type: string
                  secretUID:
                    description: SecretUID is empty only before the empty Secret identity
                      is observed.
                    type: string
                  serverSHA256:
                    description: |-
                      ServerSHA256 binds the PostgreSQL serving certificate and private-key
                      projection to the checkpointed creation result.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                required:
                - secretName
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Reconciling
                - Ready
                - Degraded
                type: string
              postgresqlBootstrapSpec:
                description: |-
                  PostgreSQLBootstrapSpec records the topology and storage contract before
                  any PostgreSQL credential or data volume is created. It provides a
                  defensive fence when admission is unavailable or bypassed.
                properties:
                  databaseTopologySHA256:
                    description: |-
                      DatabaseTopologySHA256 binds provisioned storage to the complete resolved
                      immutable logical-database genesis topology. It is omitted only on status
                      written by releases that predate database-scoped genesis.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  deletionPolicy:
                    type: string
                  durability:
                    type: string
                  membersPerShard:
                    format: int32
                    type: integer
                  postgresqlRuntime:
                    enum:
                    - direct
                    - agent-quarantine
                    type: string
                  shards:
                    format: int32
                    type: integer
                  storageClassName:
                    type: string
                  storageSize:
                    type: string
                required:
                - deletionPolicy
                - durability
                - membersPerShard
                - shards
                - storageSize
                type: object
              postgresqlBootstraps:
                description: |-
                  PostgreSQLBootstraps records the API-assigned Secret and PVC identities for
                  each shard. Missing or replaced children require an explicit recovery;
                  the controller never silently adopts or regenerates them.
                items:
                  description: |-
                    PostgreSQLBootstrapStatus binds one shard to randomly named, API-identified
                    bootstrap resources. Names are durable creation intents; UIDs are filled only
                    after the API server confirms each child. PVCFenceDetached is checkpointed
                    only after the credential Secret has been detached from cluster garbage
                    collection, making that exact Secret UID a durable owner for any outcome-
                    unknown PVC create. After PVCUID is checkpointed, the controller protects and
                    detaches that exact live PVC and anchors the Secret tombstone back to its UID.
                    Retain finalization can instead record an absent uncheckpointed outcome as
                    abandoned, after which no later outcome is retained. A workload cannot
                    consume an incomplete, abandoned, or unstabilized record.
                  properties:
                    pvcCreationAbandoned:
                      description: |-
                        PVCCreationAbandoned is set only during Retain finalization after an
                        authoritative read finds no PVC before its UID was checkpointed. No
                        workload can use an uncheckpointed claim. The controller never recreates
                        or retains a later outcome from this creation intent; the detached Secret
                        remains its garbage-collection fence until finalization removes it.
                      type: boolean
                    pvcFenceDetached:
                      description: |-
                        PVCFenceDetached proves the exact credential Secret is independent of the
                        cluster and may be used as the PVC's creation-intent owner.
                      type: boolean
                    pvcName:
                      type: string
                    pvcStorageClassName:
                      description: |-
                        PVCStorageClassName records the explicit or operator-resolved class before
                        the PVC create is dispatched, including an explicitly empty class.
                      type: string
                    pvcUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      type: string
                    secretName:
                      type: string
                    secretUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      type: string
                    shard:
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - secretName
                  - secretUID
                  - shard
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - shard
                x-kubernetes-list-type: map
              postgresqlWritableLeases:
                description: |-
                  PostgreSQLWritableLeases binds every physical cell to the exact
                  operator-owned Kubernetes Lease used for writable-term coordination. A
                  missing or recreated Lease is a new coordination universe and requires
                  explicit recovery; the controller never silently adopts its replacement.
                items:
                  description: |-
                    PostgreSQLWritableLeaseStatus pins one physical cell's writable-term Lease
                    to its API-assigned identity. The name is deterministic and role-neutral;
                    LeaseUID distinguishes deletion and recreation under that same name.
                  properties:
                    leaseName:
                      maxLength: 63
                      minLength: 1
                      type: string
                    leaseUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      type: string
                    shard:
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - leaseName
                  - leaseUID
                  - shard
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - shard
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
