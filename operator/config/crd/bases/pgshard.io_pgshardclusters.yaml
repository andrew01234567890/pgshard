                            maxLength: 2048
                            type: string
                          prefix:
                            maxLength: 1024
                            type: string
                          region:
                            maxLength: 128
                            type: string
                        required:
                        - bucket
                        - credentialsSecretRef
                        type: object
                      type:
                        enum:
                        - S3
                        - Filesystem
                        type: string
                    required:
                    - type
                    type: object
                required:
                - repository
                type: object
              databases:
                description: |-
                  Databases declares immutable genesis database topologies. Database
                  lifecycle will move to PgShardDatabase without changing this placement
                  contract.
                items:
                  properties:
                    cells:
                      description: |-
                        Cells maps logical shard ordinal i to one exact physical cell ordinal.
                        Omitting it selects the first Shards cells. Reusing cells across different
                        databases is explicit shared-cell placement; cells within one database
                        must be unique.
                      items:
                        format: int32
                        maximum: 127
                        minimum: 0
                        type: integer
                      maxItems: 128
                      minItems: 1
                      type: array
                    name:
                      maxLength: 63
                      minLength: 1
                      type: string
                    shards:
                      description: |-
                        Shards is this database's logical shard count. Zero is defaulted to the
                        number of explicitly selected cells, or to every cluster cell when cells
                        is also omitted.
                      format: int32
                      maximum: 128
                      minimum: 1
                      type: integer
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: database name is reserved by PostgreSQL or pgshard
                    rule: '!(self.name in [''postgres'', ''shardschema'', ''template0'',
                      ''template1''])'
                  - message: database topology is immutable except for exact materialization
                      of legacy defaults
                    rule: self == oldSelf || (!has(oldSelf.shards) && !has(oldSelf.cells)
                      && has(self.shards) && has(self.cells) && self.shards == size(self.cells)
                      && self.cells.all(cell, cell == self.cells.indexOf(cell)))
                maxItems: 512
                type: array
                x-kubernetes-list-map-keys:
