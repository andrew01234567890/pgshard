---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: pgshardclusters.pgshard.io
spec:
  group: pgshard.io
  names:
    kind: PgShardCluster
    listKind: PgShardClusterList
    plural: pgshardclusters
    shortNames:
    - pgsc
    singular: pgshardcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.shards
