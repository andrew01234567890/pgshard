                            format: int32
                            maximum: 100
                            minimum: 2
                            type: integer
                          minReplicas:
                            default: 2
                            format: int32
                            minimum: 2
                            type: integer
                          targetCPUUtilizationPercentage:
                            default: 65
                            format: int32
                            maximum: 100
                            minimum: 1
                            type: integer
                        type: object
                      mode:
                        default: HPA
                        enum:
                        - HPA
                        - Fixed
                        type: string
                    type: object
                type: object
              postgresql:
                properties:
                  parameters:
                    additionalProperties:
                      type: string
                    description: |-
                      Parameters contains a deliberately small set of safe tuning overrides.
                      Durability-critical and operator-owned settings are rejected.
                    type: object
                  resources:
                    description: Resources must contain positive CPU and memory requests
                      and limits.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  version:
                    default: "18"
                    description: Version is the PostgreSQL major. Only PostgreSQL
                      18 is accepted.
                    enum:
                    - "18"
                    type: string
                required:
                - resources
                type: object
              services:
                properties:
                  r:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                  ro:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                  rw:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      type:
                        default: ClusterIP
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                type: object
              shards:
                default: 1
                description: |-
                  Shards is the number of physical PostgreSQL cells in the foundation API.
                  Each logical database maps its independently ordered hash ranges onto a
                  subset of these cells. The catalog remains on physical cell zero.
                format: int32
                maximum: 128
                minimum: 1
                type: integer
              storage:
                properties:
                  deletionPolicy:
                    default: Retain
                    description: |-
                      DeletionPolicy controls PostgreSQL data PVC handling when the cluster is
                      deleted. Retain is the safe default; Delete must be selected explicitly.
                    enum:
                    - Retain
                    - Delete
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: Size is the capacity of each PostgreSQL data volume.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: StorageClassName is used for PostgreSQL data volumes.
                    type: string
                required:
                - size
                type: object
                x-kubernetes-validations:
                - message: storage size is immutable except for a one-time upgrade
                    from a legacy size below 4Gi to at least 4Gi
                  optionalOldSelf: true
                  rule: '!oldSelf.hasValue() ? quantity(self.size).compareTo(quantity(''4Gi''))
                    >= 0 : quantity(self.size).compareTo(quantity(oldSelf.value().size))
                    == 0 || (quantity(oldSelf.value().size).compareTo(quantity(''4Gi''))
                    < 0 && quantity(self.size).compareTo(quantity(''4Gi'')) >= 0)'
                - message: storage class is immutable after cluster creation
                  rule: has(self.storageClassName) == has(oldSelf.storageClassName)
                    && (!has(self.storageClassName) || self.storageClassName == oldSelf.storageClassName)
                - message: deletion policy is immutable after cluster creation
                  rule: self.deletionPolicy == oldSelf.deletionPolicy
            required:
            - backup
            - postgresql
            - storage
            type: object
            x-kubernetes-validations:
            - message: shards is immutable until physical cell transitions are implemented
              rule: self.shards == oldSelf.shards
            - message: membersPerShard is immutable until membership transitions are
                implemented
              rule: self.membersPerShard == oldSelf.membersPerShard
            - message: durability is immutable until replication-mode transitions
                are implemented
              rule: self.durability == oldSelf.durability
            - message: databases is immutable until database lifecycle and online
                resharding are implemented
              rule: '!has(oldSelf.databases) ? !has(self.databases) || size(self.databases)
                == 0 : has(self.databases) && sets.equivalent(self.databases.map(database,
                database.name), oldSelf.databases.map(database, database.name))'
          status:
            description: |-
              PgShardClusterStatus never reports readiness until the operator has actually
              reconciled and observed the data plane.
            properties:
              catalogAccess:
                description: |-
                  CatalogAccess records the staged creation and API identity of the
                  catalog-only credential and TLS Secret. The operator first creates an empty
                  non-consumable Secret, checkpoints its UID, then atomically installs
                  immutable material and checkpoints its digests. A missing or replaced
                  checkpointed Secret requires explicit recovery.
                properties:
                  clientSHA256:
                    description: |-
                      ClientSHA256 binds the pooler's password and CA projection to the
                      checkpointed creation result.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  secretName:
                    type: string
                  secretUID:
                    description: SecretUID is empty only before the empty Secret identity
                      is observed.
                    type: string
                  serverSHA256:
                    description: |-
                      ServerSHA256 binds the PostgreSQL serving certificate and private-key
                      projection to the checkpointed creation result.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                required:
                - secretName
                type: object
              catalogActivation:
                description: |-
                  CatalogActivation pins the one operator-created, initially empty carrier
                  for a future authenticated catalog materialization request. A missing or
                  replaced carrier is an explicit-recovery boundary and is never recreated.
                properties:
                  name:
                    maxLength: 253
                    minLength: 1
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    maxLength: 128
                    minLength: 1
                    type: string
                required:
                - name
                - uid
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              isolationReceipt:
                description: |-
                  IsolationReceipt is the durable, namespace-UID-bound activation state
                  machine that flips per-namespace isolation enforcement from the legacy
                  pre-activation behavior (INACTIVE) to full deny-all enforcement (ACTIVE).
                  It is absent until activation begins; while absent, admission behaves
                  exactly as before activation.
                properties:
                  activatedAt:
                    format: date-time
                    type: string
                  minAcceptableSecurityGeneration:
                    description: |-
                      MinAcceptableSecurityGeneration is the isolation-level floor: once ACTIVE, a
                      pod stamped below it is denied. It composes with (never lowers) the
                      per-class SupportingGeneration barrier.
                    format: int64
                    minimum: 0
                    type: integer
                  namespaceUID:
                    minLength: 1
                    type: string
                  phase:
                    description: IsolationPhase is the durable phase of a namespace's
                      isolation activation.
                    enum:
                    - INACTIVE
                    - ACTIVATING_QUIESCE
                    - ACTIVATING_RECREATE
                    - ACTIVE
                    type: string
                  residueProfileHash:
                    pattern: ^([0-9a-f]{64})?$
                    type: string
                  sealedParents:
                    description: |-
                      SealedParents are the exact protected-parent identities admission accepts
                      as create parents during ACTIVATING_RECREATE.
                    items:
                      description: |-
                        SealedParent is one protected parent workload sealed into the isolation
                        receipt at its exact API incarnation and contract hash.
                      properties:
                        contractHash:
                          pattern: ^([0-9a-f]{64})?$
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        resourceVersion:
                          type: string
                        uid:
                          minLength: 1
                          type: string
                      required:
                      - kind
                      - name
                      - uid
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  securityGeneration:
                    format: int64
                    minimum: 0
                    type: integer
                required:
                - namespaceUID
                - phase
                type: object
              observedGeneration:
                format: int64
                type: integer
              operationWriterAccess:
                description: |-
                  OperationWriterAccess records a separately projected, staged catalog
                  operation-writer credential. It is not mounted by any orchestrator until
                  a later connector slice is composed.
                properties:
                  materialSHA256:
                    description: MaterialSHA256 binds the exact password and catalog
                      CA projections.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  secretName:
                    maxLength: 63
                    minLength: 1
                    type: string
                  secretUID:
                    description: SecretUID is empty only before the empty Secret identity
                      is observed.
                    type: string
                required:
                - secretName
                type: object
              phase:
                enum:
                - Pending
                - Reconciling
                - Ready
                - Degraded
                type: string
              postgresqlBootstrapSpec:
                description: |-
                  PostgreSQLBootstrapSpec records the topology and storage contract before
                  any PostgreSQL credential or data volume is created. It provides a
                  defensive fence when admission is unavailable or bypassed.
                properties:
                  databaseTopologySHA256:
                    description: |-
                      DatabaseTopologySHA256 binds provisioned storage to the complete resolved
                      immutable logical-database genesis topology. It is omitted only on status
                      written by releases that predate database-scoped genesis.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  deletionPolicy:
                    type: string
                  durability:
                    type: string
                  membersPerShard:
                    format: int32
                    type: integer
                  postgresqlRuntime:
                    enum:
                    - direct
                    - agent-quarantine
                    type: string
                  replicationTransportPolicy:
                    description: |-
                      ReplicationTransportPolicy is stamped only when the bootstrap contract is
                      first recorded. Clusters provisioned before replication TLS existed have
                      no marker and are deliberately left untouched: they receive no TLS
                      Secrets and no workload-template change, and their physical replication
                      stays cleartext until the cluster is recreated under a marked contract.
                    enum:
                    - server-tls-v1
                    type: string
                  shards:
                    format: int32
                    type: integer
                  storageClassName:
                    type: string
                  storageSize:
                    type: string
                required:
                - deletionPolicy
                - durability
                - membersPerShard
                - shards
                - storageSize
                type: object
              postgresqlBootstraps:
                description: |-
                  PostgreSQLBootstraps records the API-assigned Secret and PVC identities for
                  each physical shard member. Missing or replaced children require an
                  explicit recovery; the controller never silently adopts or regenerates
                  them.
                items:
                  description: |-
                    PostgreSQLBootstrapStatus binds one physical shard member to randomly named,
                    API-identified bootstrap resources. Names are durable creation intents; UIDs
                    are filled only after the API server confirms each child. PVCFenceDetached is
                    checkpointed only after the credential Secret has been detached from cluster
                    garbage collection, making that exact Secret UID a durable owner for any
                    outcome-unknown PVC create. After PVCUID is checkpointed, the controller
                    protects and detaches that exact live PVC and anchors the Secret tombstone
                    back to its UID. Retain finalization can instead record an absent
                    uncheckpointed outcome as abandoned, after which no later outcome is
                    retained. A workload cannot consume an incomplete, abandoned, or
                    unstabilized record.
                  properties:
                    member:
                      description: Member is a stable physical identity, never a mutable
                        PostgreSQL role.
                      format: int32
                      minimum: 0
                      type: integer
                    pvcCreationAbandoned:
                      description: |-
                        PVCCreationAbandoned is set only during Retain finalization after an
                        authoritative read finds no PVC before its UID was checkpointed. No
                        workload can use an uncheckpointed claim. The controller never recreates
                        or retains a later outcome from this creation intent; the detached Secret
                        remains its garbage-collection fence until finalization removes it.
                      type: boolean
                    pvcFenceDetached:
                      description: |-
                        PVCFenceDetached proves the exact credential Secret is independent of the
                        cluster and may be used as the PVC's creation-intent owner.
                      type: boolean
                    pvcName:
                      type: string
                    pvcStorageClassName:
                      description: |-
                        PVCStorageClassName records the explicit or operator-resolved class before
                        the PVC create is dispatched, including an explicitly empty class.
                      type: string
                    pvcUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      type: string
                    secretName:
                      type: string
                    secretUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      type: string
                    shard:
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - member
                  - secretName
                  - secretUID
                  - shard
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - shard
                - member
                x-kubernetes-list-type: map
              postgresqlCatalogCandidates:
                description: |-
                  PostgreSQLCatalogCandidates binds every shard-zero member to one immutable,
                  cluster-aware catalog bootstrap configuration. These ConfigMaps are not
                  mounted by the current non-serving workloads. Missing or recreated
                  checkpointed objects require explicit recovery.
                items:
                  description: |-
                    PostgreSQLCatalogCandidateStatus pins one shard-zero member's immutable
                    catalog-bootstrap configuration to its API identity and exact payload. The
                    payload contains only references to already checkpointed immutable inputs;
                    it grants no serving role or writable authority.
                  properties:
                    configMapName:
                      maxLength: 63
                      minLength: 1
                      type: string
                    configMapUID:
                      description: |-
                        UID is a type that holds unique ID values, including UUIDs.  Because we
                        don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                        intent and helps make sure that UIDs and names do not get conflated.
                      maxLength: 128
                      minLength: 1
                      type: string
                    member:
                      format: int32
                      maximum: 4
                      minimum: 0
                      type: integer
                    payloadSHA256:
                      pattern: ^[0-9a-f]{64}$
                      type: string
                  required:
                  - configMapName
                  - configMapUID
                  - member
                  - payloadSHA256
                  type: object
                maxItems: 5
                type: array
                x-kubernetes-list-map-keys:
                - member
                x-kubernetes-list-type: map
              postgresqlConfiguration:
                description: |-
                  PostgreSQLConfiguration pins the exact immutable, content-addressed
                  PostgreSQL ConfigMap selected for a future shard-zero catalog
                  materialization attempt. It is recorded before candidate documents are
                  published so their execution bundle can bind both API incarnation and
                  canonical data bytes.
                properties:
                  configMapName:
                    maxLength: 253
                    minLength: 1
                    type: string
                  configMapUID:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    maxLength: 128
                    minLength: 1
                    type: string
                  dataSHA256:
                    pattern: ^[0-9a-f]{64}$
                    type: string
                required:
                - configMapName
                - configMapUID
