# pgshard controller-manager TokenRequest guard.
#
# This is an API-server-hosted ValidatingAdmissionPolicy (VAP), NOT a manager
# webhook. A Fail webhook served by the manager would deadlock the manager's own
# projected token at cold start (the kubelet mints it via a serviceaccounts/token
# CREATE before the manager is Ready). A VAP runs inside the API server with no
# dependency on the manager, so it can guard the manager SA's own token safely.
#
# Threat: an attacker who can call serviceaccounts/token for the manager SA can
# mint a manager-privileged token. RBAC alone is insufficient because the
# attacker already holds serviceaccounts/token. This policy narrows who may mint
# a manager token to the trusted node/kubelet TCB, bound to a Pod.
#
# NAMESPACE-INDEPENDENT BY DESIGN: the policy identifies the manager token solely
# by the service-account name (request.name == 'pgshard-controller-manager'),
# which is stable across every installation namespace, and the binding matches
# every namespace. There is deliberately NO hardcoded namespace: a namespace the
# kustomize transform does not rewrite cannot make the policy fail open, because
# the SA-name predicate holds in any namespace and a stray same-named SA elsewhere
# is only ever guarded MORE strictly, never less. (A non-default kustomize
# namePrefix changes the SA name and must be reflected here, the same assumption
# the connect webhook makes.)
#
# CEL cannot perform arbitrary GETs, so the policy only asserts what the request
# itself carries (userInfo, request.name, and the TokenRequest object's spec) and
# relies on the API server's BUILT-IN TokenRequest validation — which binds the
# issued token to the referenced Pod's UID and the SA's existence — for the rest.
#
# CEL cannot express: that the boundObjectRef Pod is actually running the manager
# (no GET), nor that the requesting node actually hosts that Pod. Those are
# covered by the API server binding the token to the Pod UID + the Node authorizer
# / NodeRestriction admission plugin, which limits a kubelet to tokens for Pods
# scheduled to its own node. Membership in system:nodes is required so that the
# Node authorizer restrictions actually apply — a username prefix alone is not
# proof of a node principal.
#
# EXPIRATION: stock Kubernetes 1.36 ServiceAccount admission injects the manager's
# automounted projected token with expirationSeconds=3607, and the kubelet sends
# exactly that. The policy therefore admits 3607 (the projected-token default) as
# well as any value <= 3600. WARNING: with the default
# --service-account-extend-token-expiration=true, an accepted 3607-second request
# is extended by the API server into an ~1-year token. Onboarding MUST set
# --service-account-extend-token-expiration=false (or otherwise bound and verify
# the issued lifetime) for this control to bound the manager token's real
# lifetime.
#
# Install (admin, §D ceremony): kubectl apply -f this file. Tune spec.audiences to
# your API server's --api-audiences BEFORE applying, or the manager's own token
# will be rejected.
#
# UNSUPPORTED below Kubernetes 1.30 (ValidatingAdmissionPolicy is not GA). Do not
# substitute RBAC for this control on older clusters: the attacker holds
# serviceaccounts/token, so an RBAC deny is not equivalent to this authenticated,
# bound, audience-scoped admission check.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: pgshard-manager-tokenrequest
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["serviceaccounts/token"]
  variables:
    - name: isManagerToken
      expression: >-
        request.name == 'pgshard-controller-manager'
  validations:
    - expression: >-
        !variables.isManagerToken ||
        (request.userInfo.username.startsWith('system:node:') && ('system:nodes' in request.userInfo.groups))
      reason: Forbidden
      message: "pgshard controller-manager tokens may only be requested by a node kubelet"
    - expression: >-
        !variables.isManagerToken ||
        (has(object.spec.boundObjectRef) && object.spec.boundObjectRef.kind == 'Pod')
      reason: Forbidden
      message: "pgshard controller-manager tokens must be bound to a Pod"
    - expression: >-
        !variables.isManagerToken ||
        (has(object.spec.audiences) && object.spec.audiences == ['https://kubernetes.default.svc'])
      reason: Forbidden
      message: "pgshard controller-manager tokens must request exactly the expected audience"
    - expression: >-
        !variables.isManagerToken ||
        !has(object.spec.expirationSeconds) || object.spec.expirationSeconds == 3607 || object.spec.expirationSeconds <= 3600
      reason: Forbidden
      message: "pgshard controller-manager token lifetime exceeds the bounded maximum"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: pgshard-manager-tokenrequest
spec:
  policyName: pgshard-manager-tokenrequest
  validationActions: ["Deny"]
