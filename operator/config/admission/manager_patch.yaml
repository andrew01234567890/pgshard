apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  progressDeadlineSeconds: 180
  template:
    metadata:
      labels:
        pgshard.io/webhook-contract: receipt-v1
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: manager
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --leader-elect=true
            - --webhook-enabled=true
            - --webhook-namespace=$(POD_NAMESPACE)
            - --webhook-service-name=pgshard-webhook-service
            - --webhook-ca-secret-name=pgshard-webhook-ca
            - --webhook-serving-secret-name=pgshard-webhook-certificate
            - --webhook-fencing-key-secret-name=pgshard-webhook-fencing-key
            - --webhook-mutating-configuration-name=pgshard-mutating-webhook-configuration
            - --webhook-validating-configuration-name=pgshard-validating-webhook-configuration
            - --webhook-cert-dir=/run/pgshard/webhook
            # KIND's kube-apiserver --request-timeout default is 1m; attesting it
            # lets the isolation-activation drain ceremonies proceed (opt-in only).
            - --attested-max-request-timeout=1m
            # Single-apiserver KIND publishes ONE kubernetes EndpointSlice backend,
            # which cannot be proven to be the complete physical backend set. The
            # activation lifecycle E2E opts a cluster into activation in this fixed
            # namespace; the admin attests it so the ceremony can converge to ACTIVE
            # in CI. Real installs attest only genuinely immutable-membership
            # namespaces.
            - --allow-unenumerable-ha-isolation-namespaces=pgshard-isolation-lifecycle
            - --orchestrator-image=pgshard/orchestrator:dev
            - --pooler-image=pgshard/pooler:dev
            - --postgresql-image=docker.io/library/postgres:18@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
            - --postgresql-bootstrap-image=pgshard/postgres-agent:dev
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          startupProbe:
            failureThreshold: 75
          volumeMounts:
            - name: webhook-certificates
              mountPath: /run/pgshard
      volumes:
        - name: webhook-certificates
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
