apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vpostgresqlpodmetadata.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlfencingnamespace.pgshard.io
    objectSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlpodstatus.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlpodbinding.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlpodcreate.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlworkload.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlpodconnect.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: vpostgresqlmanagerconnect.pgshard.io
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: pgshard-system
