---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-pgshard-io-v1alpha1-pgshardcluster
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpgshardcluster.kb.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-pgshard-io-v1alpha1-pgshardcluster
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: vpgshardcluster.kb.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
