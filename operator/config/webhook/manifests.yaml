    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods/binding
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
