  matchPolicy: Equivalent
  name: vpgshardcluster.kb.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-core-v1-postgresqlfencingnamespace
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: vpostgresqlfencingnamespace.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - UPDATE
    resources:
    - namespaces
    - namespaces/status
    - namespaces/finalize
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-core-v1-postgresqlpodbinding
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: vpostgresqlpodbinding.pgshard.io
  rules:
