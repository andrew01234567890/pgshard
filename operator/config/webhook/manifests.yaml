  failurePolicy: Fail
  matchPolicy: Equivalent
  name: vpostgresqlpodmetadata.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - UPDATE
    resources:
    - pods
    - pods/ephemeralcontainers
    - pods/resize
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-core-v1-postgresqlpodstatus
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: vpostgresqlpodstatus.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - UPDATE
    resources:
    - pods/status
  sideEffects: None
  timeoutSeconds: 5
