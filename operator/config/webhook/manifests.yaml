  name: mpostgresqlpodstatus.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - UPDATE
    resources:
    - pods/status
  sideEffects: None
  timeoutSeconds: 5
