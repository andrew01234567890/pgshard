---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-pgshard-io-v1alpha1-pgshardcluster
      port: 9444
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpgshardcluster.kb.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-pgshard-io-v1alpha1-postgresqlfencinghandshake
