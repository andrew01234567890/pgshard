---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-pgshard-io-v1alpha1-pgshardcluster
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpgshardcluster.kb.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-pgshard-io-v1alpha1-postgresqlfencinghandshake
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpostgresqlfencinghandshake.pgshard.io
  rules:
  - apiGroups:
    - pgshard.io
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - pgshardclusters
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-core-v1-postgresqlpodbinding
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpostgresqlpodbinding.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods/binding
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-core-v1-postgresqlpodstatus
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: mpostgresqlpodstatus.pgshard.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - UPDATE
    resources:
    - pods/status
  sideEffects: None
  timeoutSeconds: 5
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
