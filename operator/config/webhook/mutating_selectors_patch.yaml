apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
  - name: mpostgresqlpodbinding.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
  - name: mpostgresqlpodstatus.pgshard.io
    objectSelector:
      matchLabels:
        app.kubernetes.io/component: postgresql
        app.kubernetes.io/managed-by: pgshard-operator
  - name: mpostgresqlfencinghandshake.pgshard.io
    namespaceSelector:
      matchLabels:
        pgshard.io/pod-fencing: enabled
